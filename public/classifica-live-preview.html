<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1672, height=941, initial-scale=1.0" />
  <title>Classifica Live Preview</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 1672px;
      height: 941px;
      overflow: hidden;
      background: #111;
      font-family: Arial, sans-serif;
    }

    .canvas {
      position: relative;
      width: 1672px;
      height: 941px;
      background-image: url("/classifica-live-1672x941.png");
      background-size: 100% 100%;
      background-repeat: no-repeat;
      background-position: center;
    }

    .table-wrap {
      position: absolute;
      left: 108px;
      top: 245px; /* ABBASSATA */
      width: 1456px;
      height: 610px;
      display: flex;
      flex-direction: column;
    }

    table {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0 8px;
      table-layout: fixed;
    }

    col.col-pos { width: 21%; }
    col.col-team { width: 57%; }
    col.col-points { width: 22%; }

    thead th {
      height: 50px;
      background: linear-gradient(180deg, rgba(104,37,217,0.95), rgba(67,16,143,0.95));
      color: white;
      text-align: center;
      font-size: 22px;
      font-weight: 800;
      border: 2px solid rgba(255,255,255,0.18);
      border-radius: 14px;
    }

    tbody td {
      height: 28px;
      background: rgba(255,255,255,0.08);
      border: 2px solid rgba(150,90,255,0.45);
      color: #4a2378;
      text-align: center;
      vertical-align: middle;
      font-size: 18px;
      font-weight: 800;
      border-radius: 10px;
    }

    .team-cell {
      padding: 0 16px;
    }
  </style>
</head>
<body>
  <div class="canvas">
    <div class="table-wrap">
      <table>
        <colgroup>
          <col class="col-pos" />
          <col class="col-team" />
          <col class="col-points" />
        </colgroup>
        <thead>
          <tr>
            <th>POSIZIONE</th>
            <th>TEAM</th>
            <th>PUNTI</th>
          </tr>
        </thead>
        <tbody>
          <tr><td>1°</td><td class="team-cell">roda red</td><td>45</td></tr>
          <tr><td>2°</td><td class="team-cell">roda black</td><td>32</td></tr>
          <tr><td>3°</td><td class="team-cell">roda white</td><td>23</td></tr>
          <tr><td>4°</td><td class="team-cell"></td><td></td></tr>
          <tr><td>5°</td><td class="team-cell"></td><td></td></tr>
          <tr><td>6°</td><td class="team-cell"></td><td></td></tr>
          <tr><td>7°</td><td class="team-cell"></td><td></td></tr>
          <tr><td>8°</td><td class="team-cell"></td><td></td></tr>
          <tr><td>9°</td><td class="team-cell"></td><td></td></tr>
          <tr><td>10°</td><td class="team-cell"></td><td></td></tr>
          <tr><td>11°</td><td class="team-cell"></td><td></td></tr>
          <tr><td>12°</td><td class="team-cell"></td><td></td></tr>
          <tr><td>13°</td><td class="team-cell"></td><td></td></tr>
          <tr><td>14°</td><td class="team-cell"></td><td></td></tr>
          <tr><td>15°</td><td class="team-cell"></td><td></td></tr>
          <tr><td>16°</td><td class="team-cell"></td><td></td></tr>
        </tbody>
      </table>
    </div>
  </div>
</body>
</html>
