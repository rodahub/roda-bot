<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1672, height=941, initial-scale=1.0" />
  <title>Classifica Live Preview</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;700;800&family=Oxanium:wght@500;600;700;800&display=swap" rel="stylesheet">

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 1672px;
      height: 941px;
      overflow: hidden;
      background: #111;
    }

    body {
      font-family: 'Oxanium', sans-serif;
    }

    .canvas {
      position: relative;
      width: 1672px;
      height: 941px;
      overflow: hidden;
      background-image: url("/classifica-live-1672x941.png");
      background-size: 100% 100%;
      background-repeat: no-repeat;
      background-position: center;
    }

    /* POSIZIONE ATTUALE DELLA TABELLA - LASCIATA STABILE */
    .table-wrap {
      position: absolute;
      left: 100px;
      top: 245px;
      width: 1444px;
      height: 620px;
      z-index: 2;
    }

    table {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0 8px;
      table-layout: fixed;
    }

    col.col-pos { width: 21%; }
    col.col-team { width: 57%; }
    col.col-points { width: 22%; }

    thead th {
      height: 50px;
      text-align: center;
      vertical-align: middle;
      color: #ffffff;
      font-family: 'Orbitron', sans-serif;
      font-size: 22px;
      font-weight: 800;
      letter-spacing: 1px;
      text-transform: uppercase;
      background: linear-gradient(
        180deg,
        rgba(160, 95, 255, 0.98) 0%,
        rgba(120, 48, 242, 0.97) 45%,
        rgba(88, 28, 194, 0.97) 100%
      );
      border: 2px solid rgba(225, 205, 255, 0.35);
      border-radius: 16px;
      box-shadow:
        0 0 10px rgba(163, 98, 255, 0.75),
        0 0 22px rgba(163, 98, 255, 0.45),
        0 0 36px rgba(163, 98, 255, 0.22),
        inset 0 0 10px rgba(255,255,255,0.10);
      text-shadow:
        0 0 6px rgba(255,255,255,0.20),
        0 0 16px rgba(214, 180, 255, 0.55),
        0 0 28px rgba(176, 110, 255, 0.30);
      box-sizing: border-box;
    }

    tbody td {
      height: 28px;
      text-align: center;
      vertical-align: middle;
      border-radius: 12px;
      box-sizing: border-box;
      background: rgba(255,255,255,0.025);
      border: 2px solid rgba(185, 134, 255, 0.82);
      color: #4b1e7d;
      box-shadow:
        0 0 6px rgba(170, 115, 255, 0.22),
        0 0 14px rgba(170, 115, 255, 0.08),
        inset 0 0 6px rgba(255,255,255,0.05);
      text-shadow:
        0 0 4px rgba(255,255,255,0.12),
        0 0 10px rgba(210, 175, 255, 0.18);
    }

    tbody td.pos-cell,
    tbody td.points-cell {
      font-family: 'Orbitron', sans-serif;
      font-size: 17px;
      font-weight: 700;
      letter-spacing: 0.3px;
    }

    tbody td.team-cell {
      font-family: 'Oxanium', sans-serif;
      font-size: 19px;
      font-weight: 700;
      padding: 0 14px;
      letter-spacing: 0.2px;
    }

    /* TOP 3 PIU' EVIDENTI */
    tbody tr.top-3 td {
      color: #3f126c;
      border-color: rgba(178, 116, 255, 0.98);
      background: rgba(255,255,255,0.035);
      box-shadow:
        0 0 8px rgba(176, 110, 255, 0.34),
        0 0 18px rgba(176, 110, 255, 0.14),
        inset 0 0 8px rgba(255,255,255,0.08);
      text-shadow:
        0 0 6px rgba(255,255,255,0.14),
        0 0 10px rgba(210, 175, 255, 0.20);
    }

    /* RIGHE VUOTE: PIU' VISIBILI, NON SBIADITE */
    tbody tr.empty-row td {
      border-color: rgba(180, 128, 255, 0.78);
      background: rgba(255,255,255,0.018);
      box-shadow:
        0 0 5px rgba(174, 118, 255, 0.16),
        inset 0 0 4px rgba(255,255,255,0.03);
    }

    /* DAL 4° IN POI LA POSIZIONE DEVE RESTARE LEGGIBILE */
    tbody tr.empty-row td.pos-cell {
      color: rgba(94, 48, 150, 0.58);
      text-shadow:
        0 0 4px rgba(255,255,255,0.08),
        0 0 8px rgba(192, 156, 255, 0.14);
    }

    /* CELLE VUOTE TEAM/PUNTI RESTANO VUOTE MA CON GRIGLIA VISIBILE */
    tbody tr.empty-row td.team-cell,
    tbody tr.empty-row td.points-cell {
      color: transparent;
      text-shadow: none;
    }
  </style>
</head>
<body>
  <div class="canvas">
    <div class="table-wrap">
      <table>
        <colgroup>
          <col class="col-pos" />
          <col class="col-team" />
          <col class="col-points" />
        </colgroup>

        <thead>
          <tr>
            <th>POSIZIONE</th>
            <th>TEAM</th>
            <th>PUNTI</th>
          </tr>
        </thead>

        <tbody id="ranking-body"></tbody>
      </table>
    </div>
  </div>

  <script>
    const previewData = [
      { team: 'roda red', points: 45 },
      { team: 'roda black', points: 32 },
      { team: 'roda white', points: 23 }
    ];

    const TOTAL_ROWS = 16;
    const tbody = document.getElementById('ranking-body');

    for (let i = 0; i < TOTAL_ROWS; i++) {
      const tr = document.createElement('tr');
      const entry = previewData[i] || null;

      if (i < 3 && entry) {
        tr.classList.add('top-3');
      }

      if (!entry) {
        tr.classList.add('empty-row');
      }

      tr.innerHTML = `
        <td class="pos-cell">${i + 1}°</td>
        <td class="team-cell">${entry ? entry.team : ''}</td>
        <td class="points-cell">${entry ? entry.points : ''}</td>
      `;

      tbody.appendChild(tr);
    }
  </script>
</body>
</html>
