<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1672, initial-scale=1.0" />
  <title>Classifica Live Preview</title>

  <style>
    :root {
      --canvas-width: 1672px;
      --canvas-height: 941px;

      --table-left: 100px;
      --table-top: 248px;
      --table-width: 1440px;

      --col-pos: 300px;
      --col-team: 820px;
      --col-points: 320px;

      --header-height: 44px;
      --row-height: 28px;
      --header-gap: 10px;
      --row-gap: 8px;

      --purple-main: #7d35ff;
      --purple-dark: #5720c7;
      --purple-border: rgba(165, 108, 255, 0.95);
      --purple-soft: rgba(180, 130, 255, 0.9);
      --text-dark: #3d168c;
      --text-light: #ffffff;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      width: var(--canvas-width);
      height: var(--canvas-height);
      overflow: hidden;
      background: #ece9f0;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      position: relative;
    }

    .canvas {
      position: relative;
      width: var(--canvas-width);
      height: var(--canvas-height);
      overflow: hidden;
    }

    .background {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 0;
      pointer-events: none;
      user-select: none;
    }

    .table-wrap {
      position: absolute;
      left: var(--table-left);
      top: var(--table-top);
      width: var(--table-width);
      z-index: 2;
    }

    .grid-row {
      display: grid;
      grid-template-columns: var(--col-pos) var(--col-team) var(--col-points);
      column-gap: 0;
      align-items: center;
      width: 100%;
    }

    .header-row {
      height: var(--header-height);
      margin-bottom: var(--header-gap);
    }

    .body-row {
      height: var(--row-height);
      margin-bottom: var(--row-gap);
    }

    .cell {
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      border-radius: 14px;
      position: relative;
      overflow: hidden;
    }

    .header-cell {
      background: linear-gradient(180deg, #8c49ff 0%, #732be8 45%, #5d1fcf 100%);
      border: 2px solid rgba(174, 125, 255, 0.95);
      color: var(--text-light);
      font-weight: 900;
      font-size: 21px;
      letter-spacing: 1px;
      text-transform: uppercase;
      text-shadow:
        0 0 6px rgba(255, 255, 255, 0.35),
        0 0 12px rgba(146, 80, 255, 0.45);
      box-shadow:
        0 0 10px rgba(123, 65, 255, 0.45),
        0 0 18px rgba(176, 120, 255, 0.22),
        inset 0 0 12px rgba(255, 255, 255, 0.10);
    }

    .body-cell {
      background: rgba(255, 255, 255, 0.08);
      border: 2px solid rgba(182, 136, 255, 0.92);
      color: var(--text-dark);
      font-weight: 900;
      font-size: 18px;
      letter-spacing: 0.2px;
      text-shadow:
        0 0 5px rgba(255, 255, 255, 0.35),
        0 0 8px rgba(160, 98, 255, 0.18);
      box-shadow:
        0 0 8px rgba(166, 105, 255, 0.18),
        inset 0 0 10px rgba(255, 255, 255, 0.05);
    }

    .body-row.has-data .body-cell {
      border-color: rgba(160, 102, 255, 1);
      box-shadow:
        0 0 10px rgba(157, 93, 255, 0.22),
        inset 0 0 10px rgba(255, 255, 255, 0.06);
    }

    .pos-cell,
    .points-cell {
      font-size: 18px;
      font-weight: 900;
    }

    .team-cell {
      font-size: 18px;
      font-weight: 900;
      text-transform: uppercase;
    }

    .empty {
      color: rgba(78, 27, 152, 0.34);
      text-shadow: none;
    }
  </style>
</head>
<body>
  <div class="canvas">
    <img
      class="background"
      src="/classifica-live-1672x941.png"
      alt="Classifica Live Background"
    />

    <div class="table-wrap">
      <div class="grid-row header-row">
        <div class="cell header-cell">POSIZIONE</div>
        <div class="cell header-cell">TEAM</div>
        <div class="cell header-cell">PUNTI</div>
      </div>

      <div id="table-body"></div>
    </div>
  </div>

  <script>
    const rowsCount = 16;
    const tbody = document.getElementById("table-body");

    function formatPosition(index) {
      return `${index + 1}°`;
    }

    function renderTable(data) {
      tbody.innerHTML = "";

      for (let i = 0; i < rowsCount; i++) {
        const item = data[i] || null;
        const row = document.createElement("div");
        row.className = `grid-row body-row ${item ? "has-data" : ""}`;

        const pos = document.createElement("div");
        pos.className = `cell body-cell pos-cell ${item ? "" : "empty"}`;
        pos.textContent = formatPosition(i);

        const team = document.createElement("div");
        team.className = `cell body-cell team-cell ${item ? "" : "empty"}`;
        team.textContent = item?.team ? String(item.team).toUpperCase() : "";

        const points = document.createElement("div");
        points.className = `cell body-cell points-cell ${item ? "" : "empty"}`;
        points.textContent =
          item?.punti !== undefined && item?.punti !== null
            ? item.punti
            : item?.points !== undefined && item?.points !== null
            ? item.points
            : "";

        row.appendChild(pos);
        row.appendChild(team);
        row.appendChild(points);

        tbody.appendChild(row);
      }
    }

    async function loadLeaderboard() {
      try {
        const response = await fetch('/api/public/dashboard');
        const data = await response.json();

        const ranking = Array.isArray(data.classificaTeam)
          ? data.classificaTeam
          : [];

        renderTable(ranking);
      } catch (error) {
        console.error('Errore caricamento classifica live:', error);
        renderTable([]);
      }
    }

    loadLeaderboard();
  </script>
</body>
</html>
