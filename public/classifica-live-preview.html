<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1672, height=941, initial-scale=1.0" />
  <title>Classifica Live Preview</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;700;800&family=Rajdhani:wght@600;700&display=swap" rel="stylesheet">

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 1672px;
      height: 941px;
      overflow: hidden;
      background: #111;
    }

    body {
      font-family: 'Rajdhani', sans-serif;
    }

    .canvas {
      position: relative;
      width: 1672px;
      height: 941px;
      overflow: hidden;
      background-image: url("/classifica-live-1672x941.png");
      background-size: 100% 100%;
      background-repeat: no-repeat;
      background-position: center;
    }

    .table-wrap {
      position: absolute;
      left: 102px;
      top: 236px;
      width: 1444px;
      height: 620px;
      z-index: 2;
    }

    table {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0 8px;
      table-layout: fixed;
    }

    col.col-pos { width: 21%; }
    col.col-team { width: 57%; }
    col.col-points { width: 22%; }

    thead th {
      height: 52px;
      text-align: center;
      vertical-align: middle;
      color: #ffffff;
      font-family: 'Orbitron', sans-serif;
      font-size: 22px;
      font-weight: 800;
      letter-spacing: 1px;
      text-transform: uppercase;
      background: linear-gradient(
        180deg,
        rgba(138, 72, 255, 0.96) 0%,
        rgba(108, 43, 230, 0.96) 45%,
        rgba(77, 23, 173, 0.96) 100%
      );
      border: 2px solid rgba(205, 175, 255, 0.24);
      border-radius: 16px;
      box-shadow:
        0 0 8px rgba(137, 71, 255, 0.40),
        0 0 18px rgba(137, 71, 255, 0.20),
        inset 0 0 10px rgba(255,255,255,0.08);
      text-shadow:
        0 0 6px rgba(255,255,255,0.15),
        0 0 14px rgba(190, 150, 255, 0.30);
      box-sizing: border-box;
    }

    tbody td {
      height: 28px;
      text-align: center;
      vertical-align: middle;
      border-radius: 12px;
      box-sizing: border-box;
      background: rgba(255,255,255,0.015);
      border: 2px solid rgba(186, 139, 255, 0.62);
      color: #472172;
      font-size: 17px;
      font-weight: 700;
      box-shadow:
        0 0 4px rgba(170, 120, 255, 0.12),
        inset 0 0 6px rgba(255,255,255,0.03);
      text-shadow:
        0 0 3px rgba(255,255,255,0.10);
    }

    tbody td.pos-cell,
    tbody td.points-cell {
      font-family: 'Orbitron', sans-serif;
      font-size: 16px;
      font-weight: 700;
      letter-spacing: 0.2px;
    }

    tbody td.team-cell {
      font-family: 'Rajdhani', sans-serif;
      font-size: 21px;
      font-weight: 700;
      padding: 0 14px;
    }

    tbody tr.top-3 td {
      color: #3c125f;
      border-color: rgba(176, 120, 255, 0.88);
      box-shadow:
        0 0 7px rgba(160, 96, 255, 0.22),
        inset 0 0 7px rgba(255,255,255,0.05);
      text-shadow:
        0 0 5px rgba(190, 145, 255, 0.12);
    }

    tbody tr.empty-row td {
      color: rgba(71, 33, 114, 0.28);
      box-shadow:
        inset 0 0 4px rgba(255,255,255,0.02);
      text-shadow: none;
    }
  </style>
</head>
<body>
  <div class="canvas">
    <div class="table-wrap">
      <table>
        <colgroup>
          <col class="col-pos" />
          <col class="col-team" />
          <col class="col-points" />
        </colgroup>

        <thead>
          <tr>
            <th>POSIZIONE</th>
            <th>TEAM</th>
            <th>PUNTI</th>
          </tr>
        </thead>

        <tbody id="ranking-body"></tbody>
      </table>
    </div>
  </div>

  <script>
    const previewData = [
      { team: 'roda red', points: 45 },
      { team: 'roda black', points: 32 },
      { team: 'roda white', points: 23 }
    ];

    const TOTAL_ROWS = 16;
    const tbody = document.getElementById('ranking-body');

    for (let i = 0; i < TOTAL_ROWS; i++) {
      const tr = document.createElement('tr');
      const entry = previewData[i] || null;

      if (i < 3 && entry) tr.classList.add('top-3');
      if (!entry) tr.classList.add('empty-row');

      tr.innerHTML = `
        <td class="pos-cell">${i + 1}°</td>
        <td class="team-cell">${entry ? entry.team : ''}</td>
        <td class="points-cell">${entry ? entry.points : ''}</td>
      `;

      tbody.appendChild(tr);
    }
  </script>
</body>
</html>
