<!doctype html><html lang="it"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>RØDA Loadout</title><style>:root{--bg:#05050d;--card:#141426;--card2:#1a1730;--line:#b98cff55;--p:#8b35ff;--p2:#c084fc;--t:#f7f1ff;--m:#bcaee6}*{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at top,#28105a66,transparent 32%),linear-gradient(180deg,#05050d,#090512);color:var(--t);font-family:Arial,sans-serif}.top{position:sticky;top:0;z-index:20;background:#070711ee;backdrop-filter:blur(14px);border-bottom:1px solid var(--line);padding:16px;display:flex;justify-content:space-between;gap:12px}.brand{font-weight:950;font-size:22px}.nav a{color:#d8ccff;text-decoration:none;margin-left:8px;padding:10px 13px;border-radius:999px;font-weight:900}.nav .on{background:linear-gradient(135deg,#7b2cff77,#a855f744);color:white}.hero{text-align:center;padding:34px 16px}.hero h1{margin:0;font-size:44px;text-shadow:0 0 24px #a855f766}.hero span{color:#b879ff}.hero p{color:var(--m);margin:8px 0 0}.wrap{max-width:980px;margin:auto;padding:0 14px 50px}.tabs{display:flex;gap:8px;border-bottom:1px solid var(--line);margin-bottom:22px}.tab{padding:14px 16px;color:#d8ccff;cursor:pointer;font-weight:950}.tab.active{color:#fff;border-bottom:3px solid #b55cff}.panel{display:none}.panel.active{display:block}.box,.empty,.card,.section{background:linear-gradient(180deg,#1b1b31,#0e0e1b);border:1px solid var(--line);border-radius:26px;padding:20px;box-shadow:0 0 34px #7b2cff22,0 22px 60px #0009}.section{margin-top:16px;background:linear-gradient(180deg,#17172b,#101020)}.section h3{margin:0 0 16px;font-size:19px}.section h3:before{content:"";display:inline-block;width:9px;height:9px;border-radius:50%;background:#a855f7;box-shadow:0 0 16px #a855f7;margin-right:9px}.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:18px}.formgrid{display:grid;grid-template-columns:1fr 1fr;gap:14px}.field{margin-bottom:15px}.field label,.slot label{display:block;margin-bottom:8px;color:#c6b7ef;font-size:12px;font-weight:950;text-transform:uppercase;letter-spacing:.08em}input,textarea{width:100%;box-sizing:border-box;border:1px solid #b98cff66;background:linear-gradient(180deg,#19192d,#10101e);color:white;border-radius:16px;padding:14px;font-size:16px;outline:0}input::placeholder,textarea::placeholder{color:#d8ccff77}input:focus,textarea:focus{box-shadow:0 0 0 3px #7b2cff30,0 0 24px #a855f740;border-color:#c7a7ff}.r-select{position:relative}.r-trigger{width:100%;box-sizing:border-box;border:1px solid #b98cff66;background:linear-gradient(180deg,#19192d,#10101e);color:white;border-radius:16px;padding:14px 44px 14px 14px;font-size:16px;outline:0;cursor:pointer;text-align:left}.r-trigger:after{content:'⌄';position:absolute;right:16px;top:50%;transform:translateY(-50%);color:#d8ccff;font-size:22px}.r-select.open .r-trigger{border-color:#c7a7ff;box-shadow:0 0 0 3px #7b2cff30,0 0 22px #a855f740}.r-menu{position:absolute;z-index:50;left:0;right:0;top:calc(100% + 8px);display:none;max-height:280px;overflow:auto;background:#0d0d1b;border:1px solid #b98cff77;border-radius:16px;box-shadow:0 18px 45px #000c,0 0 28px #7b2cff33;padding:6px}.r-select.open .r-menu{display:block}.r-option{padding:12px 13px;border-radius:12px;color:#eee8ff;cursor:pointer;font-weight:850}.r-option:hover,.r-option.active{background:#7b2cff38;color:white}.slots{display:grid;grid-template-columns:1fr;gap:12px}.slot{background:#151529;border:1px solid #b98cff33;border-radius:20px;padding:14px}.slot label{text-transform:none;font-size:15px;color:white}.btn{width:100%;border:0;border-radius:16px;padding:15px;background:linear-gradient(135deg,#7b2cff,#a855f7);color:white;font-weight:950;font-size:15px;margin-top:16px;cursor:pointer}.msg{margin-top:14px;padding:14px;border-radius:14px}.ok{background:#22c55e22;color:#a7f3d0}.ko{background:#ff5c7a22;color:#ffb0c0}.build-card{position:relative;overflow:hidden;padding:0}.build-card:before{content:"";position:absolute;inset:-40%;background:radial-gradient(circle,#a855f72e,transparent 34%);pointer-events:none}.build-head{padding:20px 20px 14px;position:relative}.build-head h3{margin:0;font-size:26px}.build-meta{color:#d9ccff;margin-top:8px;font-weight:850}.creator{color:#fff;margin-top:10px;font-weight:950}.graphic-actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px}.graphic-preview{display:block;margin:0 18px 18px;border-radius:22px;overflow:hidden;border:1px solid #c084fc77;background:#090916;box-shadow:0 0 30px #7b2cff33}.graphic-preview img{display:block;width:100%;aspect-ratio:9/16;object-fit:cover;object-position:top}.open-btn,.download-btn{display:inline-flex;text-decoration:none;color:white;border-radius:999px;padding:10px 14px;font-weight:950}.open-btn{background:linear-gradient(135deg,#7b2cff,#a855f7)}.download-btn{background:linear-gradient(135deg,#181829,#2a2443);border:1px solid #b98cff66}.mini-accessori{display:flex;flex-wrap:wrap;gap:8px;padding:0 18px 18px}.chip{display:inline-block;background:#ffffff12;border:1px solid #ffffff18;border-radius:12px;padding:7px 10px;color:#efe8ff;font-size:13px}.chip b{display:block;color:#cdbdff;font-size:10px;text-transform:uppercase}@media(max-width:640px){.top{display:block}.nav{margin-top:12px}.nav a{margin:0 3px}.formgrid{grid-template-columns:1fr}.hero h1{font-size:34px}.box,.section{padding:16px}.grid{grid-template-columns:1fr}}</style></head><body><header class="top"><div class="brand">RØDA CUP</div><nav class="nav"><a href="/">Home</a><a href="/clan">Clan</a><a href="/streamer">Streamer</a><a class="on" href="/loadout">Loadout</a></nav></header><div class="hero"><h1>RØDA <span>Loadout</span></h1><p>Crea e invia la tua configurazione personalizzata.</p></div><main class="wrap"><div class="tabs"><div class="tab active" data-tab="list">Equipaggiamenti</div><div class="tab" data-tab="form">Crea il tuo Loadout</div></div><section id="tab-list" class="panel active"><h2>Build della community</h2><div class="grid" id="buildsGrid"><div class="empty">Caricamento...</div></div></section><section id="tab-form" class="panel"><div class="box"><h2>Crea il tuo Loadout</h2><div class="section"><h3>Informazioni build</h3><div class="formgrid"><div class="field"><label>Gioco</label><div id="gSel"></div></div><div class="field"><label>Categoria</label><div id="cSel"></div></div><div class="field" style="grid-column:1/-1"><label>Arma</label><input id="a" placeholder="Scrivi nome arma"></div><div class="field" style="grid-column:1/-1"><label>Firma creator</label><input id="cr" placeholder="Es. RooS"></div></div></div><div class="section"><h3>Accessori build</h3><div class="slots" id="slots"></div></div><div class="section"><h3>Riepilogo</h3><div class="empty" id="sum">Nessuna selezione</div></div><button class="btn" id="send" type="button">Invia Loadout</button><div id="msg" style="display:none"></div></div></section></main><script>const S=['Ottica','Volata','Canna','Sottocanna','Caricatore','Impugnatura','Calcio','Laser','Mod fuoco'];const state={g:'Warzone',c:''};const CATS=['Fucili d\'Assalto','Mitragliette','Sniper Rifle','Mitragliatrici Leggere','Fucili Tattici','Pistole','A Canna Liscia','Sniper','Fucili Da Battaglia','Special','Mischia','Lanciatori'];document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>{document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));document.querySelectorAll('.panel').forEach(x=>x.classList.remove('active'));t.classList.add('active');document.getElementById('tab-'+t.dataset.tab).classList.add('active')});function e(x){return String(x||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}function v(id){return document.getElementById(id).value.trim()}function val(k){return state[k]||''}function sl(x){return String(x||'').toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-+|-+$/g,'')||'manuale'}function comps(){return Array.from(document.querySelectorAll('.cmp')).map(i=>({slot:i.dataset.slot,nome:i.value.trim()})).filter(x=>x.nome)}function customSelect(rootId,key,items,placeholder){const root=document.getElementById(rootId);root.className='r-select';function render(){const current=state[key]||'';root.innerHTML=`<button type="button" class="r-trigger">${e(current||placeholder)}</button><div class="r-menu">${items.map(x=>`<div class="r-option ${x===current?'active':''}" data-v="${e(x)}">${e(x)}</div>`).join('')}</div>`;root.querySelector('.r-trigger').onclick=(ev)=>{ev.stopPropagation();document.querySelectorAll('.r-select.open').forEach(s=>{if(s!==root)s.classList.remove('open')});root.classList.toggle('open')};root.querySelectorAll('.r-option').forEach(o=>o.onclick=()=>{state[key]=o.dataset.v;root.classList.remove('open');render();upd()})}render()}document.addEventListener('click',()=>document.querySelectorAll('.r-select.open').forEach(s=>s.classList.remove('open')));function make(){document.getElementById('slots').innerHTML=S.map(x=>`<div class="slot"><label>${e(x)}</label><input class="cmp" data-slot="${e(x)}" placeholder="Scrivi accessorio"></div>`).join('');document.querySelectorAll('input,textarea').forEach(x=>{x.oninput=upd})}function upd(){let a=comps(),h='';if(v('a'))h+=`<div><b>Arma:</b> ${e(v('a'))}</div>`;h+=`<div><b>Gioco:</b> ${e(val('g'))}</div><div><b>Categoria:</b> ${e(val('c')||'—')}</div>`;if(v('cr'))h+=`<div><b>Creator:</b> ${e(v('cr'))}</div>`;if(a.length){h+='<hr><b>Accessori:</b><ul>';a.forEach(x=>h+=`<li><b>${e(x.slot)}:</b> ${e(x.nome)}</li>`);h+='</ul>'}document.getElementById('sum').innerHTML=h||'Nessuna selezione'}async function send(){let errs=[];if(v('a').length<2)errs.push('Scrivi il nome dell’arma.');if(!val('c'))errs.push('Seleziona una categoria.');if(v('cr').length<2)errs.push('Scrivi la firma creator.');if(!comps().length)errs.push('Scrivi almeno un accessorio.');if(errs.length)return msg(errs.join(' '),'ko');let btn=document.getElementById('send');btn.disabled=true;btn.textContent='Invio in corso...';let a=comps().slice(0,9).map(x=>({slot:x.slot,accessorioId:'manual-'+sl(x.slot+'-'+x.nome),nome:x.nome}));let p={creatorName:v('cr'),gioco:val('g'),categoria:val('c'),armaId:'manual-'+sl(v('a')),armaNome:v('a'),stile:'Personalizzato',accessori:a,note:''};try{let r=await fetch('/api/loadout/builds',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(p)}),d=await r.json();msg(d.ok?(d.message||'Loadout inviato. Dopo l’approvazione dello staff comparirà il pulsante Scarica build.'):(d.message||'Errore invio.'),d.ok?'ok':'ko');if(d.ok){document.querySelectorAll('#tab-form input').forEach(i=>i.value='');state.c='';customSelect('cSel','c',CATS,'Seleziona categoria');make();upd();load()}}catch(x){msg('Errore di connessione.','ko')}finally{btn.disabled=false;btn.textContent='Invia Loadout'}}function msg(t,c){let m=document.getElementById('msg');m.className='msg '+c;m.textContent=t;m.style.display='block'}async function load(){let g=document.getElementById('buildsGrid');try{let r=await fetch('/api/loadout/builds',{cache:'no-store'}),d=await r.json(),bs=Array.isArray(d.builds)?d.builds:[];if(!bs.length){g.innerHTML='<div class="empty">Nessun equipaggiamento approvato ancora.</div>';return}g.innerHTML=bs.map(b=>{let graphicUrl=b.graphicUrl||('/api/loadout/builds/'+encodeURIComponent(b.id)+'/graphic');let downloadUrl='/api/loadout/builds/'+encodeURIComponent(b.id)+'/graphic?download=1';return `<article class="card build-card"><div class="build-head"><h3>${e(b.armaNome)}</h3><div class="build-meta">${e(b.categoria||'')} · ${e(b.gioco||'Warzone')}</div><div class="creator">By ${e(b.creatorName||'Creator')}</div><div class="graphic-actions"><a class="open-btn" href="${e(graphicUrl)}" target="_blank">Apri grafica</a><a class="download-btn" href="${e(downloadUrl)}">Scarica build</a></div></div><a class="graphic-preview" href="${e(graphicUrl)}" target="_blank"><img src="${e(graphicUrl)}" alt="Grafica ${e(b.armaNome)}"></a><div class="mini-accessori">${(b.accessori||[]).map(x=>`<span class="chip"><b>${e(x.slot||x.tipo)}</b>${e(x.nome)}</span>`).join('')}</div></article>`}).join('')}catch(x){g.innerHTML='<div class="empty">Errore caricamento build.</div>'}}customSelect('gSel','g',['Warzone','BO7','BO6'],'Seleziona gioco');customSelect('cSel','c',CATS,'Seleziona categoria');make();upd();load();document.getElementById('send').onclick=send;</script></body></html>
