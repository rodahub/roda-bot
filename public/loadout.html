<!doctype html><html lang="it"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>RØDA Loadout</title><style>body{margin:0;background:#060611;color:#f4efff;font-family:Arial,sans-serif}.top{position:sticky;top:0;z-index:20;background:#080812ee;border-bottom:1px solid #b98cff44;padding:16px;display:flex;justify-content:space-between;gap:12px}.brand{font-weight:950;font-size:22px}.nav a{color:#d8ccff;text-decoration:none;margin-left:8px;padding:9px 12px;border-radius:999px;font-weight:800}.nav .on{background:#7b2cff44;color:white}.hero{text-align:center;padding:38px 16px}.hero h1{margin:0;font-size:44px}.hero span{color:#a855f7}.wrap{max-width:920px;margin:auto;padding:0 14px 50px}.tabs{display:flex;gap:8px;border-bottom:1px solid #b98cff44;margin-bottom:22px}.tab{padding:12px;color:#d8ccff;cursor:pointer;font-weight:900}.tab.active{color:white;border-bottom:2px solid #a855f7}.panel{display:none}.panel.active{display:block}.box,.empty,.card,.section{background:linear-gradient(180deg,#1b1b31,#0f0f1d);border:1px solid #b98cff44;border-radius:24px;padding:20px;box-shadow:0 0 28px #7b2cff22,0 18px 55px #0008}.section{margin-top:16px;background:linear-gradient(180deg,#17172b,#101020)}.section h3{margin:0 0 16px;font-size:19px}.section h3:before{content:"";display:inline-block;width:9px;height:9px;border-radius:50%;background:#a855f7;box-shadow:0 0 16px #a855f7;margin-right:9px}.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px}.formgrid{display:grid;grid-template-columns:1fr 1fr;gap:14px}.field{margin-bottom:15px}.field label,.slot label{display:block;margin-bottom:8px;color:#c6b7ef;font-size:12px;font-weight:900;text-transform:uppercase;letter-spacing:.08em}input,textarea{width:100%;box-sizing:border-box;border:1px solid #b98cff66;background:linear-gradient(180deg,#19192d,#111120);color:white;border-radius:16px;padding:14px;font-size:16px;outline:0}input::placeholder,textarea::placeholder{color:#d8ccff77}input:focus,textarea:focus{box-shadow:0 0 0 3px #7b2cff30,0 0 22px #a855f740;border-color:#c7a7ff}textarea{min-height:100px}.r-select{position:relative}.r-trigger{width:100%;box-sizing:border-box;border:1px solid #b98cff66;background:linear-gradient(180deg,#19192d,#111120);color:white;border-radius:16px;padding:14px 44px 14px 14px;font-size:16px;outline:0;cursor:pointer;text-align:left;box-shadow:inset 0 1px 0 #ffffff08}.r-trigger:after{content:'⌄';position:absolute;right:16px;top:50%;transform:translateY(-50%);color:#d8ccff;font-size:22px}.r-select.open .r-trigger{border-color:#c7a7ff;box-shadow:0 0 0 3px #7b2cff30,0 0 22px #a855f740}.r-menu{position:absolute;z-index:50;left:0;right:0;top:calc(100% + 8px);display:none;max-height:280px;overflow:auto;background:#0d0d1b;border:1px solid #b98cff77;border-radius:16px;box-shadow:0 18px 45px #000c,0 0 28px #7b2cff33;padding:6px}.r-select.open .r-menu{display:block}.r-option{padding:12px 13px;border-radius:12px;color:#eee8ff;cursor:pointer;font-weight:800}.r-option:hover,.r-option.active{background:#7b2cff38;color:white}.slots{display:grid;grid-template-columns:1fr 1fr;gap:14px}.slot{background:#151529;border:1px solid #b98cff33;border-radius:20px;padding:14px}.slot label{text-transform:none;font-size:15px;color:white}.btn{width:100%;border:0;border-radius:16px;padding:15px;background:linear-gradient(135deg,#7b2cff,#a855f7);color:white;font-weight:950;font-size:15px;margin-top:16px;cursor:pointer}.btn:active{transform:scale(.99)}.msg{margin-top:14px;padding:14px;border-radius:14px}.ok{background:#22c55e22;color:#a7f3d0}.ko{background:#ff5c7a22;color:#ffb0c0}.chip{display:inline-block;background:#ffffff12;border:1px solid #ffffff18;border-radius:10px;padding:6px 9px;margin:4px;color:#d8cff8}.chip b{display:block;color:#d8ccff;font-size:10px}@media(max-width:640px){.top{display:block}.nav{margin-top:12px}.nav a{margin:0 3px}.slots,.formgrid{grid-template-columns:1fr}.hero h1{font-size:34px}.box,.section{padding:16px}}</style></head><body><header class="top"><div class="brand">RØDA CUP</div><nav class="nav"><a href="/">Home</a><a href="/clan">Clan</a><a href="/streamer">Streamer</a><a class="on" href="/loadout">Loadout</a></nav></header><div class="hero"><h1>RØDA <span>Loadout</span></h1><p>Crea e invia la tua configurazione personalizzata.</p></div><main class="wrap"><div class="tabs"><div class="tab active" data-tab="list">Equipaggiamenti</div><div class="tab" data-tab="form">Crea il tuo Loadout</div></div><section id="tab-list" class="panel active"><h2>Build della community</h2><div class="grid" id="buildsGrid"><div class="empty">Caricamento...</div></div></section><section id="tab-form" class="panel"><div class="box"><h2>Crea il tuo Loadout</h2><div class="section"><h3>Informazioni build</h3><div class="formgrid"><div class="field"><label>Gioco</label><div id="gSel"></div></div><div class="field"><label>Categoria</label><div id="cSel"></div></div><div class="field"><label>Arma</label><input id="a" placeholder="Scrivi nome arma"></div><div class="field"><label>Stile</label><div id="sSel"></div></div><div class="field" style="grid-column:1/-1"><label>Firma creator</label><input id="cr" placeholder="Es. RooS"></div></div></div><div class="section"><h3>Accessori</h3><div class="slots" id="slots"></div></div><div class="section"><h3>Note opzionali</h3><div class="field"><label>Note</label><textarea id="nt" placeholder="Es. build per ranked, controllo facile..."></textarea></div></div><div class="section"><h3>Riepilogo</h3><div class="empty" id="sum">Nessuna selezione</div></div><button class="btn" id="send" type="button">Invia Loadout</button><div id="msg" style="display:none"></div></div></section></main><script>const S=['Ottica','Volata','Canna','Sottocanna','Caricatore','Impugnatura','Calcio','Laser','Mod fuoco'];const state={g:'Warzone',c:'',s:'Personalizzato'};const CATS=['Fucili d\'Assalto','Mitragliette','Sniper Rifle','Mitragliatrici Leggere','Fucili Tattici','Pistole','A Canna Liscia','Sniper','Fucili Da Battaglia','Special','Mischia','Lanciatori'];const STYLES=['Personalizzato','Meta','Lungo raggio','Corto raggio','Supporto','Mobilità','Resurgence','Ranked'];document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>{document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));document.querySelectorAll('.panel').forEach(x=>x.classList.remove('active'));t.classList.add('active');document.getElementById('tab-'+t.dataset.tab).classList.add('active')});function e(x){return String(x||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}function v(id){return document.getElementById(id).value.trim()}function val(k){return state[k]||''}function sl(x){return String(x||'').toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-+|-+$/g,'')||'manuale'}function comps(){return Array.from(document.querySelectorAll('.cmp')).map(i=>({slot:i.dataset.slot,nome:i.value.trim()})).filter(x=>x.nome)}function customSelect(rootId,key,items,placeholder){const root=document.getElementById(rootId);root.className='r-select';function render(){const current=state[key]||'';root.innerHTML=`<button type="button" class="r-trigger">${e(current||placeholder)}</button><div class="r-menu">${items.map(x=>`<div class="r-option ${x===current?'active':''}" data-v="${e(x)}">${e(x)}</div>`).join('')}</div>`;root.querySelector('.r-trigger').onclick=(ev)=>{ev.stopPropagation();document.querySelectorAll('.r-select.open').forEach(s=>{if(s!==root)s.classList.remove('open')});root.classList.toggle('open')};root.querySelectorAll('.r-option').forEach(o=>o.onclick=(ev)=>{state[key]=o.dataset.v;root.classList.remove('open');render();upd()})}render()}document.addEventListener('click',()=>document.querySelectorAll('.r-select.open').forEach(s=>s.classList.remove('open')));function make(){document.getElementById('slots').innerHTML=S.map(x=>`<div class="slot"><label>${e(x)}</label><input class="cmp" data-slot="${e(x)}" placeholder="Scrivi accessorio"></div>`).join('');document.querySelectorAll('input,textarea').forEach(x=>{x.oninput=upd})}function upd(){let a=comps(),h='';if(v('a'))h+=`<div><b>Arma:</b> ${e(v('a'))}</div>`;h+=`<div><b>Gioco:</b> ${e(val('g'))}</div><div><b>Categoria:</b> ${e(val('c')||'—')}</div><div><b>Stile:</b> ${e(val('s'))}</div>`;if(v('cr'))h+=`<div><b>Creator:</b> ${e(v('cr'))}</div>`;if(a.length){h+='<hr><b>Accessori:</b><ul>';a.forEach(x=>h+=`<li><b>${e(x.slot)}:</b> ${e(x.nome)}</li>`);h+='</ul>'}document.getElementById('sum').innerHTML=h||'Nessuna selezione'}async function send(){let errs=[];if(v('a').length<2)errs.push('Scrivi il nome dell’arma.');if(!val('c'))errs.push('Seleziona una categoria.');if(v('cr').length<2)errs.push('Scrivi la firma creator.');if(!comps().length)errs.push('Scrivi almeno un accessorio.');if(errs.length)return msg(errs.join(' '),'ko');let btn=document.getElementById('send');btn.disabled=true;btn.textContent='Invio in corso...';let a=comps().slice(0,5).map(x=>({slot:x.slot,accessorioId:'manual-'+sl(x.slot+'-'+x.nome),nome:x.nome}));let p={creatorName:v('cr'),gioco:val('g'),categoria:val('c'),armaId:'manual-'+sl(v('a')),armaNome:v('a'),stile:val('s'),accessori:a,note:v('nt')};try{let r=await fetch('/api/loadout/builds',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(p)}),d=await r.json();msg(d.ok?(d.message||'Loadout inviato.'):(d.message||'Errore invio.'),d.ok?'ok':'ko');if(d.ok){document.querySelectorAll('#tab-form input,#tab-form textarea').forEach(i=>i.value='');state.c='';customSelect('cSel','c',CATS,'Seleziona categoria');make();upd();load()}}catch(x){msg('Errore di connessione.','ko')}finally{btn.disabled=false;btn.textContent='Invia Loadout'}}function msg(t,c){let m=document.getElementById('msg');m.className='msg '+c;m.textContent=t;m.style.display='block'}async function load(){let g=document.getElementById('buildsGrid');try{let r=await fetch('/api/loadout/builds',{cache:'no-store'}),d=await r.json(),bs=Array.isArray(d.builds)?d.builds:[];if(!bs.length){g.innerHTML='<div class="empty">Nessun equipaggiamento approvato ancora.</div>';return}g.innerHTML=bs.map(b=>`<div class="card"><h3>${e(b.armaNome)}</h3><p>${e(b.categoria||'')} · ${e(b.stile||'Build')}</p><p>By <b>${e(b.creatorName||'Creator')}</b></p>${b.graphicUrl?`<p><a href="${e(b.graphicUrl)}" target="_blank" style="color:#d8ccff;font-weight:900">Apri grafica</a></p>`:''}${(b.accessori||[]).map(x=>`<span class="chip"><b>${e(x.slot||x.tipo)}</b>${e(x.nome)}</span>`).join('')}</div>`).join('')}catch(x){g.innerHTML='<div class="empty">Errore caricamento build.</div>'}}customSelect('gSel','g',['Warzone','BO7','BO6'],'Seleziona gioco');customSelect('cSel','c',CATS,'Seleziona categoria');customSelect('sSel','s',STYLES,'Seleziona stile');make();upd();load();document.getElementById('send').onclick=send;</script></body></html>
