<!doctype html><html lang="it"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>RØDA Loadout</title><style>body{margin:0;background:#060611;color:#f4efff;font-family:Arial,sans-serif}.top{position:sticky;top:0;background:#080812ee;border-bottom:1px solid #b98cff44;padding:16px;display:flex;justify-content:space-between;gap:12px}.brand{font-weight:950;font-size:22px}.nav a{color:#d8ccff;text-decoration:none;margin-left:8px;padding:9px 12px;border-radius:999px;font-weight:800}.nav .on{background:#7b2cff44;color:white}.hero{text-align:center;padding:38px 16px}.hero h1{margin:0;font-size:44px}.hero span{color:#a855f7}.wrap{max-width:920px;margin:auto;padding:0 14px 50px}.tabs{display:flex;gap:8px;border-bottom:1px solid #b98cff44;margin-bottom:22px}.tab{padding:12px;color:#d8ccff;cursor:pointer;font-weight:900}.tab.active{color:white;border-bottom:2px solid #a855f7}.panel{display:none}.panel.active{display:block}.box,.empty,.card{background:linear-gradient(180deg,#1b1b31,#0f0f1d);border:1px solid #b98cff44;border-radius:24px;padding:20px;box-shadow:0 0 28px #7b2cff22,0 18px 55px #0008}.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px}.field{margin-bottom:15px}.field label,.slot label{display:block;margin-bottom:8px;color:#c6b7ef;font-size:12px;font-weight:900;text-transform:uppercase;letter-spacing:.08em}input,select,textarea{width:100%;box-sizing:border-box;border:1px solid #b98cff66;background:linear-gradient(180deg,#19192d,#111120);color:white;border-radius:16px;padding:14px;font-size:16px;outline:0}input::placeholder,textarea::placeholder{color:#d8ccff77}input:focus,select:focus,textarea:focus{box-shadow:0 0 0 3px #7b2cff30,0 0 22px #a855f740;border-color:#c7a7ff}textarea{min-height:100px}.slots{display:grid;grid-template-columns:1fr 1fr;gap:14px}.slot{background:#151529;border:1px solid #b98cff33;border-radius:20px;padding:14px}.slot label{text-transform:none;font-size:15px;color:white}.btn{width:100%;border:0;border-radius:16px;padding:15px;background:linear-gradient(135deg,#7b2cff,#a855f7);color:white;font-weight:950;font-size:15px}.btn:disabled{opacity:.45}.msg{margin-top:14px;padding:14px;border-radius:14px}.ok{background:#22c55e22;color:#a7f3d0}.ko{background:#ff5c7a22;color:#ffb0c0}.chip{display:inline-block;background:#ffffff12;border:1px solid #ffffff18;border-radius:10px;padding:6px 9px;margin:4px;color:#d8cff8}.chip b{display:block;color:#d8ccff;font-size:10px}@media(max-width:640px){.top{display:block}.nav{margin-top:12px}.nav a{margin:0 3px}.slots{grid-template-columns:1fr}}</style></head><body><header class="top"><div class="brand">RØDA CUP</div><nav class="nav"><a href="/">Home</a><a href="/clan">Clan</a><a href="/streamer">Streamer</a><a class="on" href="/loadout">Loadout</a></nav></header><div class="hero"><h1>RØDA <span>Loadout</span></h1><p>Compila manualmente la configurazione. Lo staff controlla prima della pubblicazione.</p></div><main class="wrap"><div class="tabs"><div class="tab active" data-tab="list">Equipaggiamenti</div><div class="tab" data-tab="form">Crea il tuo Loadout</div></div><section id="tab-list" class="panel active"><h2>Build della community</h2><div class="grid" id="buildsGrid"><div class="empty">Caricamento...</div></div></section><section id="tab-form" class="panel"><div class="box"><h2>Crea il tuo Loadout</h2><p style="color:#d8ccffaa">Gli slot terminano a Mod fuoco.</p><div class="field"><label>Gioco</label><select id="g"><option>Warzone</option><option>BO7</option><option>BO6</option></select></div><div class="field"><label>Categoria</label><input id="c" placeholder="Scrivi categoria"></div><div class="field"><label>Nome principale</label><input id="n" placeholder="Scrivi nome"></div><div class="field"><label>Stile</label><select id="s"><option>Personalizzato</option><option>Meta</option><option>Lungo raggio</option><option>Corto raggio</option></select></div><div class="field"><label>Firma creator</label><input id="cr" placeholder="Es. RooS"></div><div class="slots" id="slots"></div><div class="field"><label>Note</label><textarea id="nt" placeholder="Note opzionali"></textarea></div><div class="field"><label>Riepilogo</label><div class="empty" id="sum">Nessuna selezione</div></div><button class="btn" id="send" onclick="send()" disabled>Invia Loadout</button><div id="msg" style="display:none"></div></div></section></main><script>const S=['Ottica','Volata','Canna','Sottocanna','Caricatore','Impugnatura','Calcio','Laser','Mod fuoco'];document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>{document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));document.querySelectorAll('.panel').forEach(x=>x.classList.remove('active'));t.classList.add('active');document.getElementById('tab-'+t.dataset.tab).classList.add('active')});function e(x){return String(x||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}function v(id){return document.getElementById(id).value.trim()}function sl(x){return String(x||'').toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-+|-+$/g,'')||'manuale'}function comps(){return Array.from(document.querySelectorAll('.cmp')).map(i=>({slot:i.dataset.slot,nome:i.value.trim()})).filter(x=>x.nome)}function make(){document.getElementById('slots').innerHTML=S.map(x=>`<div class="slot"><label>${e(x)}</label><input class="cmp" data-slot="${e(x)}" placeholder="Scrivi qui"></div>`).join('');document.querySelectorAll('input,select,textarea').forEach(x=>{x.oninput=upd;x.onchange=upd})}function upd(){let a=comps(),h='';if(v('n'))h+=`<div><b>Nome:</b> ${e(v('n'))}</div>`;h+=`<div><b>Gioco:</b> ${e(v('g'))}</div><div><b>Categoria:</b> ${e(v('c')||'Manuale')}</div><div><b>Stile:</b> ${e(v('s'))}</div>`;if(v('cr'))h+=`<div><b>Creator:</b> ${e(v('cr'))}</div>`;if(a.length){h+='<hr><b>Componenti:</b><ul>';a.forEach(x=>h+=`<li><b>${e(x.slot)}:</b> ${e(x.nome)}</li>`);h+='</ul>'}document.getElementById('sum').innerHTML=h||'Nessuna selezione';document.getElementById('send').disabled=!(v('n').length>=2&&v('cr').length>=2&&a.length)}async function send(){let a=comps().map(x=>({slot:x.slot,accessorioId:'manual-'+sl(x.slot+'-'+x.nome),nome:x.nome}));let p={creatorName:v('cr'),gioco:v('g'),categoria:v('c')||'Manuale',armaId:'manual-'+sl(v('n')),armaNome:v('n'),stile:v('s'),accessori:a,note:v('nt')};try{let r=await fetch('/api/loadout/builds',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(p)}),d=await r.json();msg(d.ok?(d.message||'Loadout inviato.'):(d.message||'Errore invio.'),d.ok?'ok':'ko');if(d.ok){document.querySelectorAll('#tab-form input,#tab-form textarea').forEach(i=>i.value='');make();upd();load()}}catch(x){msg('Errore di connessione.','ko')}}function msg(t,c){let m=document.getElementById('msg');m.className='msg '+c;m.textContent=t;m.style.display='block'}async function load(){let g=document.getElementById('buildsGrid');try{let r=await fetch('/api/loadout/builds',{cache:'no-store'}),d=await r.json(),bs=Array.isArray(d.builds)?d.builds:[];if(!bs.length){g.innerHTML='<div class="empty">Nessun equipaggiamento approvato ancora.</div>';return}g.innerHTML=bs.map(b=>`<div class="card"><h3>${e(b.armaNome)}</h3><p>${e(b.categoria||'')} · ${e(b.stile||'Build')}</p><p>By <b>${e(b.creatorName||'Creator')}</b></p>${(b.accessori||[]).map(x=>`<span class="chip"><b>${e(x.slot||x.tipo)}</b>${e(x.nome)}</span>`).join('')}</div>`).join('')}catch(x){g.innerHTML='<div class="empty">Errore caricamento build.</div>'}}make();upd();load();</script></body></html>
