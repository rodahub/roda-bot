<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <link rel="icon" type="image/png" href="/rodasitologo.png"/>
  <title>RØDA • Gestione Loadout</title>
  <style>
  :root{
    --bg:#050508;--bg2:#090914;--panel:#111120;--panel2:#17172b;--panel3:#20203a;
    --text:#faf7ff;--muted:#aaa6c5;--soft:#d8ccff;--line:rgba(170,120,255,.18);
    --line2:rgba(190,145,255,.38);--purple:#7b2cff;--purple2:#a963ff;
    --green:#18c964;--red:#ff4d6d;--yellow:#ffd166;--blue:#57b7ff;
    --shadow:0 0 0 1px rgba(170,120,255,.10),0 24px 70px rgba(0,0,0,.42),0 0 38px rgba(123,44,255,.14);
    --radius:20px;
  }
  *{box-sizing:border-box;scrollbar-width:thin;scrollbar-color:rgba(170,120,255,.46) transparent;}
  *::-webkit-scrollbar{width:7px;height:7px}
  *::-webkit-scrollbar-thumb{background:rgba(170,120,255,.46);border-radius:999px}
  html,body{margin:0;min-height:100%;font-family:Inter,Arial,sans-serif;color:var(--text);
    background:radial-gradient(circle at 8% 8%,rgba(123,44,255,.24),transparent 28%),
    radial-gradient(circle at 88% 8%,rgba(87,183,255,.12),transparent 26%),
    radial-gradient(circle at 55% 100%,rgba(123,44,255,.12),transparent 36%),
    linear-gradient(180deg,#050507 0%,#090910 100%);}
  button,input,textarea,select{font-family:inherit;}

  /* ─── topbar ─── */
  .topbar{position:sticky;top:0;z-index:200;background:rgba(5,5,8,.88);backdrop-filter:blur(14px);
    border-bottom:1px solid var(--line);display:flex;align-items:center;gap:16px;padding:0 28px;height:62px;}
  .topbar-logo{font-size:18px;font-weight:800;letter-spacing:.04em;background:linear-gradient(90deg,#fff,var(--purple2));
    -webkit-background-clip:text;-webkit-text-fill-color:transparent;white-space:nowrap;}
  .topbar-sub{font-size:13px;color:var(--muted);margin-left:2px;}
  .topbar-right{margin-left:auto;display:flex;gap:10px;align-items:center;}

  /* ─── status bar ─── */
  #statusBar{padding:10px 28px;font-size:13px;font-weight:600;display:none;
    border-bottom:1px solid var(--line);background:rgba(123,44,255,.10);color:var(--soft);}

  /* ─── layout ─── */
  .main{max-width:1180px;margin:0 auto;padding:32px 24px 80px;}

  /* ─── section cards ─── */
  .section-card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);
    margin-bottom:28px;overflow:hidden;box-shadow:var(--shadow);}
  .section-hd{display:flex;align-items:center;gap:12px;padding:20px 24px;
    border-bottom:1px solid var(--line);background:rgba(123,44,255,.07);}
  .section-hd h2{margin:0;font-size:16px;font-weight:700;color:var(--soft);}
  .badge{display:inline-flex;align-items:center;justify-content:center;min-width:22px;height:22px;
    padding:0 7px;border-radius:99px;font-size:11px;font-weight:800;background:var(--purple);color:#fff;}
  .badge.yellow{background:var(--yellow);color:#000;}
  .badge.green{background:var(--green);color:#000;}
  .badge.red{background:var(--red);color:#fff;}
  .badge.muted{background:var(--panel3);color:var(--muted);}
  .section-body{padding:20px 24px;}

  /* ─── build cards ─── */
  .builds-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px;}
  .build-card{background:var(--panel2);border:1px solid var(--line);border-radius:14px;
    padding:18px;display:flex;flex-direction:column;gap:10px;}
  .build-card-header{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;}
  .build-card-weapon{font-size:15px;font-weight:700;color:var(--soft);}
  .build-card-tipo{font-size:11px;font-weight:600;background:rgba(123,44,255,.22);
    color:var(--purple2);border-radius:99px;padding:2px 10px;white-space:nowrap;}
  .build-card-meta{font-size:12px;color:var(--muted);line-height:1.6;}
  .build-card-meta span{display:block;}
  .build-card-atts{display:flex;flex-wrap:wrap;gap:6px;}
  .att-pill{font-size:11px;background:var(--panel3);border:1px solid var(--line);
    border-radius:99px;padding:2px 9px;color:var(--muted);}
  .att-pill b{color:var(--soft);font-weight:600;}
  .build-card-nota{font-size:12px;color:var(--muted);font-style:italic;border-top:1px solid var(--line);
    padding-top:8px;margin-top:2px;}
  .build-card-actions{display:flex;gap:8px;margin-top:4px;}
  .empty-msg{color:var(--muted);font-size:14px;text-align:center;padding:20px 0;}

  /* ─── buttons ─── */
  .btn{border:none;border-radius:99px;padding:7px 18px;font-size:13px;font-weight:700;
    cursor:pointer;transition:opacity .15s,transform .1s;display:inline-flex;align-items:center;gap:6px;}
  .btn:hover{opacity:.82;transform:translateY(-1px);}
  .btn:active{transform:scale(.97);}
  .btn-purple{background:linear-gradient(135deg,var(--purple),var(--purple2));color:#fff;}
  .btn-green{background:var(--green);color:#000;}
  .btn-red{background:var(--red);color:#fff;}
  .btn-blue{background:var(--blue);color:#000;}
  .btn-muted{background:var(--panel3);color:var(--muted);border:1px solid var(--line);}
  .btn-sm{padding:5px 13px;font-size:12px;}
  .btn-xs{padding:3px 10px;font-size:11px;}

  /* ─── table ─── */
  table{width:100%;border-collapse:collapse;font-size:13px;}
  th{color:var(--muted);font-weight:600;text-align:left;padding:8px 12px;
    border-bottom:1px solid var(--line);white-space:nowrap;}
  td{padding:10px 12px;border-bottom:1px solid rgba(170,120,255,.08);vertical-align:middle;}
  tr:last-child td{border-bottom:none;}
  tr:hover td{background:rgba(123,44,255,.04);}

  /* ─── toggle switch ─── */
  .toggle{position:relative;display:inline-block;width:38px;height:22px;}
  .toggle input{opacity:0;width:0;height:0;}
  .toggle-slider{position:absolute;inset:0;border-radius:99px;background:var(--panel3);
    transition:.25s;cursor:pointer;}
  .toggle-slider:before{content:'';position:absolute;width:16px;height:16px;border-radius:50%;
    left:3px;top:3px;background:var(--muted);transition:.25s;}
  input:checked+.toggle-slider{background:var(--green);}
  input:checked+.toggle-slider:before{transform:translateX(16px);background:#fff;}

  /* ─── form panel ─── */
  .form-panel{background:var(--panel2);border:1px solid var(--line);border-radius:14px;padding:20px 22px;}
  .form-panel h3{margin:0 0 16px;font-size:14px;font-weight:700;color:var(--soft);}
  .form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;}
  .form-row.tri{grid-template-columns:1fr 1fr 1fr;}
  .form-row.full{grid-template-columns:1fr;}
  label{display:block;font-size:11px;font-weight:600;color:var(--muted);margin-bottom:4px;}
  input[type=text],select{width:100%;background:var(--panel3);border:1px solid var(--line2);
    border-radius:10px;padding:9px 12px;color:var(--text);font-size:13px;outline:none;
    transition:border-color .2s;}
  input[type=text]:focus,select:focus{border-color:var(--purple2);}
  .compat-list{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px;}
  .compat-check{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--muted);
    background:var(--panel3);border:1px solid var(--line);border-radius:8px;padding:4px 9px;cursor:pointer;}
  .compat-check input{margin:0;}
  .compat-check:has(input:checked){border-color:var(--purple2);color:var(--soft);}

  /* ─── db sections side by side on wide ─── */
  .db-cols{display:grid;grid-template-columns:1fr 1fr;gap:20px;}
  @media(max-width:860px){.db-cols{grid-template-columns:1fr;}.form-row{grid-template-columns:1fr;}.form-row.tri{grid-template-columns:1fr 1fr;}}
  @media(max-width:560px){.form-row.tri{grid-template-columns:1fr;}}

  /* ─── confirm modal ─── */
  #confirmModal{display:none;position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,.72);
    align-items:center;justify-content:center;padding:20px;}
  #confirmModal.open{display:flex;}
  .confirm-box{background:#13101e;border:1px solid rgba(255,100,100,.28);border-radius:20px;
    padding:28px 28px 24px;max-width:380px;width:100%;box-shadow:0 20px 80px rgba(0,0,0,.6);}
  .confirm-box p{color:var(--soft);font-size:15px;margin:0 0 24px;line-height:1.6;}
  .confirm-box .btns{display:flex;gap:10px;justify-content:flex-end;}
  </style>
</head>
<body>

<!-- topbar -->
<div class="topbar">
  <div>
    <div class="topbar-logo">RØDA</div>
    <div class="topbar-sub">Gestione Loadout</div>
  </div>
  <div class="topbar-right">
    <a class="btn btn-muted btn-sm" href="/admin">← Admin</a>
    <button class="btn btn-purple btn-sm" id="refreshBtn">🔄 Aggiorna</button>
    <button class="btn btn-muted btn-sm" id="logoutBtn">Esci</button>
  </div>
</div>

<!-- status bar -->
<div id="statusBar"></div>

<div class="main">

  <!-- ── IN ATTESA ───────────────────────────────────────────────────── -->
  <div class="section-card">
    <div class="section-hd">
      <span class="badge yellow" id="bdgAttesa">0</span>
      <h2>Equipaggiamenti in attesa</h2>
    </div>
    <div class="section-body">
      <div class="builds-grid" id="listAttesa">
        <div class="empty-msg">Caricamento…</div>
      </div>
    </div>
  </div>

  <!-- ── APPROVATI ───────────────────────────────────────────────────── -->
  <div class="section-card">
    <div class="section-hd">
      <span class="badge green" id="bdgApprovati">0</span>
      <h2>Equipaggiamenti approvati</h2>
    </div>
    <div class="section-body">
      <div class="builds-grid" id="listApprovati">
        <div class="empty-msg">Caricamento…</div>
      </div>
    </div>
  </div>

  <!-- ── RIFIUTATI ───────────────────────────────────────────────────── -->
  <div class="section-card">
    <div class="section-hd">
      <span class="badge red" id="bdgRifiutati">0</span>
      <h2>Equipaggiamenti rifiutati</h2>
    </div>
    <div class="section-body">
      <div class="builds-grid" id="listRifiutati">
        <div class="empty-msg">Caricamento…</div>
      </div>
    </div>
  </div>

  <!-- ── DATABASE ────────────────────────────────────────────────────── -->
  <div class="section-card">
    <div class="section-hd">
      <h2>🗄️ Database armi &amp; accessori</h2>
    </div>
    <div class="section-body">
      <div class="db-cols">

        <!-- ARMI -->
        <div>
          <div class="form-panel" style="margin-bottom:18px;">
            <h3>➕ Aggiungi / modifica arma</h3>
            <div class="form-row">
              <div><label>ID univoco</label><input type="text" id="wId" placeholder="es. ram7"/></div>
              <div><label>Nome visualizzato</label><input type="text" id="wNome" placeholder="es. RAM-7"/></div>
            </div>
            <div class="form-row full">
              <div><label>Categoria</label>
                <select id="wCat">
                  <option value="Fucile d'assalto">Fucile d'assalto</option>
                  <option value="Fucile da battaglia">Fucile da battaglia</option>
                  <option value="Mitraglietta">Mitraglietta</option>
                  <option value="Shotgun">Shotgun</option>
                  <option value="Cecchino">Cecchino</option>
                  <option value="Mitragliatrice leggera">Mitragliatrice leggera</option>
                  <option value="Fucile tattico">Fucile tattico</option>
                  <option value="Pistola">Pistola</option>
                </select>
              </div>
            </div>
            <button class="btn btn-purple btn-sm" onclick="saveWeapon()">💾 Salva arma</button>
          </div>
          <div id="weaponsTable">Caricamento…</div>
        </div>

        <!-- ACCESSORI -->
        <div>
          <div class="form-panel" style="margin-bottom:18px;">
            <h3>➕ Aggiungi / modifica accessorio</h3>
            <div class="form-row">
              <div><label>ID univoco</label><input type="text" id="aId" placeholder="es. att_mymuz"/></div>
              <div><label>Nome visualizzato</label><input type="text" id="aNome" placeholder="es. Muzzle X"/></div>
            </div>
            <div class="form-row full">
              <div><label>Tipo slot</label>
                <select id="aTipo">
                  <option value="Ottica">Ottica</option>
                  <option value="Volata">Volata</option>
                  <option value="Canna">Canna</option>
                  <option value="Sottocanna">Sottocanna</option>
                  <option value="Caricatore">Caricatore</option>
                  <option value="Impugnatura">Impugnatura</option>
                  <option value="Calcio">Calcio</option>
                  <option value="Laser">Laser</option>
                  <option value="Mod fuoco">Mod fuoco</option>
                </select>
              </div>
            </div>
            <div class="form-row full">
              <div>
                <label>Armi compatibili</label>
                <div class="compat-list" id="compatList">Caricamento…</div>
              </div>
            </div>
            <button class="btn btn-purple btn-sm" onclick="saveAttachment()" style="margin-top:10px;">💾 Salva accessorio</button>
          </div>
          <div id="attachmentsTable">Caricamento…</div>
        </div>

      </div><!-- /db-cols -->
    </div>
  </div>

</div><!-- /main -->

<!-- ── CONFIRM MODAL ─────────────────────────────────────────────────────── -->
<div id="confirmModal">
  <div class="confirm-box">
    <p id="confirmMsg"></p>
    <div class="btns">
      <button class="btn btn-muted" id="confirmCancel">Annulla</button>
      <button class="btn btn-red" id="confirmOk">Conferma</button>
    </div>
  </div>
</div>

<script>
'use strict';

/* ── Escape XSS ──────────────────────────────────────────────────────────── */
function esc(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

/* ── Status bar ──────────────────────────────────────────────────────────── */
function setStatus(msg, ok) {
  const bar = document.getElementById('statusBar');
  bar.textContent = msg;
  bar.style.display = 'block';
  bar.style.color = ok === false ? 'var(--red)' : ok === true ? 'var(--green)' : 'var(--soft)';
  clearTimeout(bar._t);
  bar._t = setTimeout(() => { bar.style.display = 'none'; }, 4500);
}

/* ── API fetch helper ────────────────────────────────────────────────────── */
async function api(url, opts = {}) {
  try {
    const headers = { 'Content-Type': 'application/json', ...(opts.headers || {}) };
    const res = await fetch(url, { ...opts, headers, credentials: 'same-origin' });
    if (res.status === 401 || res.status === 403) { location.href = '/login'; return null; }
    return await res.json();
  } catch (e) {
    setStatus('Errore di rete: ' + e.message, false);
    return null;
  }
}

/* ── Cache dati per edit (evita JSON inline negli onclick) ───────────────── */
const _weaponById = new Map();
const _attById    = new Map();
let   _weaponsCache = [];
let   _attachmentsCache = [];

/* ── Confirm modal ───────────────────────────────────────────────────────── */
let _confirmResolve = null;
function rodaConfirm(msg, okText, cancelText) {
  return new Promise(resolve => {
    _confirmResolve = resolve;
    document.getElementById('confirmMsg').textContent = msg;
    document.getElementById('confirmOk').textContent  = okText    || 'Conferma';
    document.getElementById('confirmCancel').textContent = cancelText || 'Annulla';
    document.getElementById('confirmModal').classList.add('open');
  });
}
function confirmClose(val) {
  document.getElementById('confirmModal').classList.remove('open');
  if (_confirmResolve) { _confirmResolve(val); _confirmResolve = null; }
}
document.getElementById('confirmOk').addEventListener('click',     () => confirmClose(true));
document.getElementById('confirmCancel').addEventListener('click', () => confirmClose(false));
document.getElementById('confirmModal').addEventListener('click',  e => {
  if (e.target === document.getElementById('confirmModal')) confirmClose(false);
});

/* ── Event delegation (bottoni generati dinamicamente) ───────────────────── */
document.addEventListener('click', function(e) {
  const btn = e.target.closest('[data-action]');
  if (!btn) return;
  const action = btn.dataset.action;
  const id     = btn.dataset.id;

  if (action === 'edit-weapon') {
    const w = _weaponById.get(id);
    if (!w) { console.warn('[Loadout] Arma non trovata in cache:', id); return; }
    document.getElementById('wId').value    = w.id;
    document.getElementById('wNome').value  = w.nome;
    document.getElementById('wCat').value   = w.categoria;
    document.getElementById('wId').scrollIntoView({ behavior: 'smooth', block: 'center' });
    setTimeout(() => document.getElementById('wId').focus(), 200);
    setStatus('Arma caricata nel form — modifica e premi Salva.', true);

  } else if (action === 'edit-attachment') {
    const a = _attById.get(id);
    if (!a) { console.warn('[Loadout] Accessorio non trovato in cache:', id); return; }
    document.getElementById('aId').value   = a.id;
    document.getElementById('aNome').value = a.nome;
    document.getElementById('aTipo').value = a.tipo;
    document.querySelectorAll('.compat-cb').forEach(cb => {
      cb.checked = Array.isArray(a.armiCompatibili) && a.armiCompatibili.includes(cb.value);
    });
    document.getElementById('aId').scrollIntoView({ behavior: 'smooth', block: 'center' });
    setTimeout(() => document.getElementById('aId').focus(), 200);
    setStatus('Accessorio caricato nel form — modifica e premi Salva.', true);

  } else if (action === 'approve-build') {
    approve(id);
  } else if (action === 'reject-build') {
    reject(id);
  } else if (action === 'delete-build') {
    deleteBuild(id);
  } else {
    console.warn('[Loadout] data-action non gestito:', action);
  }
});

/* toggle change delegation */
document.addEventListener('change', function(e) {
  const inp = e.target.closest('input[data-action]');
  if (!inp) return;
  const action = inp.dataset.action;
  const id     = inp.dataset.id;
  if (action === 'toggle-weapon')     toggleWeapon(id, inp);
  else if (action === 'toggle-att')   toggleAttachment(id, inp);
  else console.warn('[Loadout] data-action change non gestito:', action);
});

/* ── Build card renderer ─────────────────────────────────────────────────── */
function buildCard(b) {
  const atts = (b.accessori || []).map(a =>
    `<span class="att-pill"><b>${esc(a.tipo)}:</b> ${esc(a.nome)}</span>`
  ).join('');
  const nota = b.nota
    ? `<div class="build-card-nota">💬 ${esc(b.nota)}</div>` : '';
  const metaDate = b.approvedAt
    ? `<span>✅ Approvato: ${new Date(b.approvedAt).toLocaleDateString('it-IT')}</span>` : '';
  return `<div class="build-card">
    <div class="build-card-header">
      <div class="build-card-weapon">${esc(b.armaNome)}</div>
      <span class="build-card-tipo">${esc(b.tipoEquipaggiamento)}</span>
    </div>
    <div class="build-card-meta">
      <span>👤 ${esc(b.creator)}${b.firma ? ' — <em>' + esc(b.firma) + '</em>' : ''}</span>
      <span>📁 ${esc(b.categoriaArma)}</span>
      ${metaDate}
      <span style="font-size:11px;color:rgba(170,120,255,.5)">ID: ${esc(b.id)}</span>
    </div>
    <div class="build-card-atts">${atts || '<span class="att-pill">—</span>'}</div>
    ${nota}
    <div class="build-card-actions" data-bid="${esc(b.id)}"></div>
  </div>`;
}

function buildActions(stato, id) {
  const sid = esc(id);
  if (stato === 'in_attesa') return `
    <button class="btn btn-green btn-sm" data-action="approve-build" data-id="${sid}">✅ Approva</button>
    <button class="btn btn-red   btn-sm" data-action="reject-build"  data-id="${sid}">❌ Rifiuta</button>`;
  return `<button class="btn btn-red btn-sm" data-action="delete-build" data-id="${sid}">🗑️ Elimina</button>`;
}

/* ── Carica tutto ────────────────────────────────────────────────────────── */
async function loadAll() {
  setStatus('Aggiornamento in corso…');
  await Promise.all([loadBuilds(), fetchWeaponsAdmin()]);
  await fetchAttachmentsAdmin();
  setStatus('Dati aggiornati.', true);
}

/* ── Build ───────────────────────────────────────────────────────────────── */
async function loadBuilds() {
  const data = await api('/api/admin/loadout/builds');
  if (!data || !data.ok) return;

  const attesa    = data.in_attesa  || [];
  const approvati = data.approvati  || [];
  const rifiutati = data.rifiutati  || [];

  document.getElementById('bdgAttesa').textContent    = attesa.length;
  document.getElementById('bdgApprovati').textContent = approvati.length;
  document.getElementById('bdgRifiutati').textContent = rifiutati.length;

  const renderList = (list, containerId, stato) => {
    const el = document.getElementById(containerId);
    if (!list.length) {
      el.innerHTML = '<div class="empty-msg">Nessuna build inviata.</div>';
      return;
    }
    el.innerHTML = list.map(b => buildCard(b)).join('');
    list.forEach(b => {
      const actEl = el.querySelector(`[data-bid="${esc(b.id)}"]`);
      if (actEl) actEl.innerHTML = buildActions(stato, b.id);
    });
  };

  renderList(attesa,    'listAttesa',    'in_attesa');
  renderList(approvati, 'listApprovati', 'approvato');
  renderList(rifiutati, 'listRifiutati', 'rifiutato');
}

async function approve(id) {
  if (!await rodaConfirm('Approvare questo equipaggiamento?', 'Approva', 'Annulla')) return;
  const d = await api(`/api/admin/loadout/approve/${id}`, { method: 'POST' });
  if (d && d.ok) { setStatus('✅ Approvato!', true); loadBuilds(); }
  else setStatus(d?.message || 'Errore approvazione.', false);
}

async function reject(id) {
  if (!await rodaConfirm('Rifiutare questo equipaggiamento?', 'Rifiuta', 'Annulla')) return;
  const d = await api(`/api/admin/loadout/reject/${id}`, { method: 'POST' });
  if (d && d.ok) { setStatus('Rifiutato.', true); loadBuilds(); }
  else setStatus(d?.message || 'Errore rifiuto.', false);
}

async function deleteBuild(id) {
  if (!await rodaConfirm('Eliminare definitivamente questo equipaggiamento?', 'Elimina', 'Annulla')) return;
  const d = await api(`/api/admin/loadout/${id}`, { method: 'DELETE' });
  if (d && d.ok) { setStatus('Eliminato.', true); loadBuilds(); }
  else setStatus(d?.message || 'Errore eliminazione.', false);
}

/* ── Weapons ─────────────────────────────────────────────────────────────── */
async function fetchWeaponsAdmin() {
  const data = await api('/api/admin/loadout/weapons-all');
  if (!data || !data.ok) return;
  _weaponsCache = data.weapons || [];
  _weaponById.clear();
  _weaponsCache.forEach(w => _weaponById.set(w.id, w));
  updateWeaponsTable(_weaponsCache);
  renderCompatList();
}

function updateWeaponsTable(weapons) {
  const el = document.getElementById('weaponsTable');
  if (!weapons.length) {
    el.innerHTML = '<div class="empty-msg">Nessuna arma presente. Aggiungi la prima arma dal form sopra.</div>';
    return;
  }
  el.innerHTML = `<table>
    <thead><tr><th>ID</th><th>Nome</th><th>Categoria</th><th>Attiva</th><th>Azioni</th></tr></thead>
    <tbody>${weapons.map(w => `<tr>
      <td><code style="font-size:11px;color:var(--muted)">${esc(w.id)}</code></td>
      <td>${esc(w.nome)}</td>
      <td><span class="att-pill">${esc(w.categoria)}</span></td>
      <td>
        <label class="toggle">
          <input type="checkbox" ${w.attiva ? 'checked' : ''}
            data-action="toggle-weapon" data-id="${esc(w.id)}"/>
          <span class="toggle-slider"></span>
        </label>
      </td>
      <td>
        <button class="btn btn-muted btn-xs"
          data-action="edit-weapon" data-id="${esc(w.id)}" title="Modifica arma">✏️</button>
      </td>
    </tr>`).join('')}</tbody>
  </table>`;
}

async function saveWeapon() {
  const id        = document.getElementById('wId').value.trim();
  const nome      = document.getElementById('wNome').value.trim();
  const categoria = document.getElementById('wCat').value;
  if (!id || !nome) { setStatus('Compila ID e Nome prima di salvare.', false); return; }
  const d = await api('/api/admin/loadout/weapons', {
    method: 'POST',
    body: JSON.stringify({ id, nome, categoria, attiva: true })
  });
  if (d && d.ok) {
    setStatus('✅ Arma salvata!', true);
    document.getElementById('wId').value   = '';
    document.getElementById('wNome').value = '';
    await fetchWeaponsAdmin();
  } else {
    setStatus(d?.message || 'Errore salvataggio arma.', false);
  }
}

async function toggleWeapon(id, chk) {
  const d = await api(`/api/admin/loadout/weapons/toggle/${id}`, { method: 'POST' });
  if (!d || !d.ok) {
    chk.checked = !chk.checked;
    setStatus('Errore toggle arma.', false);
  } else {
    setStatus(d.attiva ? '✅ Arma attivata' : '⛔ Arma disattivata', true);
    await fetchWeaponsAdmin();
  }
}

/* ── Attachments ─────────────────────────────────────────────────────────── */
async function fetchAttachmentsAdmin() {
  const data = await api('/api/admin/loadout/attachments-all');
  if (!data || !data.ok) return;
  _attachmentsCache = data.attachments || [];
  _attById.clear();
  _attachmentsCache.forEach(a => _attById.set(a.id, a));
  updateAttachmentsTable(_attachmentsCache);
}

function renderCompatList() {
  const el = document.getElementById('compatList');
  if (!_weaponsCache.length) {
    el.innerHTML = '<span style="color:var(--muted);font-size:12px;">Prima aggiungi almeno un\'arma.</span>';
    return;
  }
  el.innerHTML = _weaponsCache.map(w =>
    `<label class="compat-check">
      <input type="checkbox" value="${esc(w.id)}" class="compat-cb"> ${esc(w.nome)}
    </label>`
  ).join('');
}

function updateAttachmentsTable(atts) {
  const el = document.getElementById('attachmentsTable');
  if (!atts.length) {
    el.innerHTML = '<div class="empty-msg">Nessun accessorio presente. Aggiungi il primo accessorio dal form sopra.</div>';
    return;
  }
  el.innerHTML = `<table>
    <thead><tr><th>ID</th><th>Nome</th><th>Tipo</th><th>Attivo</th><th>Azioni</th></tr></thead>
    <tbody>${atts.map(a => `<tr>
      <td><code style="font-size:11px;color:var(--muted)">${esc(a.id)}</code></td>
      <td>${esc(a.nome)}</td>
      <td><span class="att-pill">${esc(a.tipo)}</span></td>
      <td>
        <label class="toggle">
          <input type="checkbox" ${a.attivo ? 'checked' : ''}
            data-action="toggle-att" data-id="${esc(a.id)}"/>
          <span class="toggle-slider"></span>
        </label>
      </td>
      <td>
        <button class="btn btn-muted btn-xs"
          data-action="edit-attachment" data-id="${esc(a.id)}" title="Modifica accessorio">✏️</button>
      </td>
    </tr>`).join('')}</tbody>
  </table>`;
}

async function saveAttachment() {
  const id   = document.getElementById('aId').value.trim();
  const nome = document.getElementById('aNome').value.trim();
  const tipo = document.getElementById('aTipo').value;
  const armiCompatibili = [...document.querySelectorAll('.compat-cb:checked')].map(c => c.value);
  if (!id || !nome) { setStatus('Compila ID e Nome prima di salvare.', false); return; }
  const d = await api('/api/admin/loadout/attachments', {
    method: 'POST',
    body: JSON.stringify({ id, nome, tipo, armiCompatibili, attivo: true })
  });
  if (d && d.ok) {
    setStatus('✅ Accessorio salvato!', true);
    document.getElementById('aId').value   = '';
    document.getElementById('aNome').value = '';
    document.querySelectorAll('.compat-cb').forEach(c => c.checked = false);
    await fetchAttachmentsAdmin();
  } else {
    setStatus(d?.message || 'Errore salvataggio accessorio.', false);
  }
}

async function toggleAttachment(id, chk) {
  const d = await api(`/api/admin/loadout/attachments/toggle/${id}`, { method: 'POST' });
  if (!d || !d.ok) {
    chk.checked = !chk.checked;
    setStatus('Errore toggle accessorio.', false);
  } else {
    setStatus(d.attivo ? '✅ Accessorio attivato' : '⛔ Accessorio disattivato', true);
    await fetchAttachmentsAdmin();
  }
}

/* ── Topbar buttons ──────────────────────────────────────────────────────── */
document.getElementById('refreshBtn').addEventListener('click', loadAll);

document.getElementById('logoutBtn').addEventListener('click', async () => {
  try { await fetch('/api/logout', { method: 'POST', credentials: 'same-origin' }); } catch {}
  location.href = '/login';
});

/* ── Init ────────────────────────────────────────────────────────────────── */
loadAll();
</script>
</body>
</html>
