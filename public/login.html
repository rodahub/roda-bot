<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Accesso area admin</title>
  <style>
    :root{
      --line:rgba(160,110,255,.18);
      --text:#f7f4ff;
      --muted:#aaa6c5;
      --purple:#7b2cff;
      --purple-2:#9c5cff;
      --shadow:0 0 0 1px rgba(162,109,255,.12), 0 0 35px rgba(123,44,255,.20);
    }

    *{
      box-sizing:border-box;
      -webkit-tap-highlight-color:transparent;
    }

    html,body{
      margin:0;
      padding:0;
      min-height:100vh;
      font-family:Inter,Arial,sans-serif;
      background:
        radial-gradient(circle at top left, rgba(123,44,255,.18), transparent 28%),
        radial-gradient(circle at bottom right, rgba(123,44,255,.14), transparent 28%),
        linear-gradient(180deg, #050507 0%, #08080d 100%);
      color:var(--text);
    }

    body{
      display:flex;
      align-items:center;
      justify-content:center;
      padding:24px;
    }

    .login-box{
      width:100%;
      max-width:460px;
      background:linear-gradient(180deg, rgba(18,18,31,.96), rgba(10,10,17,.98));
      border:1px solid var(--line);
      border-radius:28px;
      padding:28px;
      box-shadow:var(--shadow);
      overflow:hidden;
    }

    .head{
      display:flex;
      align-items:center;
      justify-content:center;
      flex-direction:column;
      text-align:center;
      margin-bottom:22px;
    }

    .logo{
      width:86px;
      height:86px;
      object-fit:contain;
      filter: drop-shadow(0 0 18px rgba(123,44,255,.55));
      margin-bottom:10px;
    }

    .text-logo{
      height:42px;
      width:auto;
      object-fit:contain;
      filter: drop-shadow(0 0 12px rgba(123,44,255,.38));
      margin-bottom:8px;
    }

    .title{
      font-size:24px;
      font-weight:900;
      margin-bottom:8px;
    }

    .subtitle{
      color:var(--muted);
      font-size:14px;
      line-height:1.45;
    }

    .field{
      margin-bottom:14px;
    }

    .field label{
      display:block;
      font-size:13px;
      font-weight:700;
      color:#d9d4ef;
      margin-bottom:8px;
    }

    .field input{
      width:100%;
      height:52px;
      border-radius:16px;
      border:1px solid rgba(255,255,255,.08);
      background:rgba(255,255,255,.03);
      color:#fff;
      padding:0 14px;
      font-size:15px;
      outline:none;
    }

    .login-btn{
      width:100%;
      height:54px;
      border:0;
      border-radius:16px;
      background:linear-gradient(135deg, var(--purple), var(--purple-2));
      color:#fff;
      font-size:15px;
      font-weight:900;
      cursor:pointer;
      box-shadow:0 0 24px rgba(123,44,255,.28);
    }

    .login-btn:disabled{
      opacity:.65;
      cursor:not-allowed;
    }

    .secondary-btn{
      width:100%;
      height:50px;
      border:1px solid rgba(255,255,255,.08);
      border-radius:16px;
      background:rgba(255,255,255,.03);
      color:#fff;
      font-size:14px;
      font-weight:800;
      cursor:pointer;
      margin-top:10px;
    }

    .msg{
      min-height:22px;
      margin-top:14px;
      text-align:center;
      font-size:14px;
      color:#ff97aa;
    }
  </style>
</head>
<body>
  <div class="login-box">
    <div class="head">
      <img src="/roda-logo.png" alt="Logo" class="logo" />
      <img src="/roda-text.png" alt="RØDA" class="text-logo" />
      <div class="title">Accesso area admin</div>
      <div class="subtitle">Inserisci email e password per entrare nella dashboard staff privata.</div>
    </div>

    <div class="field">
      <label for="email">Email admin</label>
      <input id="email" type="email" autocomplete="username" placeholder="Inserisci email admin" />
    </div>

    <div class="field">
      <label for="password">Password</label>
      <input id="password" type="password" autocomplete="current-password" placeholder="Inserisci password" />
    </div>

    <button id="loginBtn" class="login-btn">ACCEDI ALLA DASHBOARD</button>
    <button id="homeBtn" class="secondary-btn">TORNA AL SITO PUBBLICO</button>

    <div id="msg" class="msg"></div>
  </div>

  <script>
    const loginBtn = document.getElementById('loginBtn');
    const homeBtn = document.getElementById('homeBtn');
    const msg = document.getElementById('msg');
    const emailInput = document.getElementById('email');
    const passwordInput = document.getElementById('password');

    async function checkSession() {
      try {
        const res = await fetch('/api/session', {
          credentials: 'same-origin'
        });

        const data = await res.json().catch(() => null);
        if (res.ok && data?.ok) {
          window.location.href = '/admin';
        }
      } catch {}
    }

    async function doLogin() {
      const email = emailInput.value.trim();
      const password = passwordInput.value;

      msg.textContent = '';
      loginBtn.disabled = true;
      loginBtn.innerText = 'ACCESSO IN CORSO...';

      try {
        const res = await fetch('/api/login', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          credentials: 'same-origin',
          body: JSON.stringify({ email, password })
        });

        const data = await res.json();

        if (!res.ok || !data.ok) {
          msg.textContent = data.message || 'Accesso fallito';
          loginBtn.disabled = false;
          loginBtn.innerText = 'ACCEDI ALLA DASHBOARD';
          return;
        }

        window.location.href = '/admin';
      } catch (e) {
        msg.textContent = 'Errore di connessione';
        loginBtn.disabled = false;
        loginBtn.innerText = 'ACCEDI ALLA DASHBOARD';
      }
    }

    loginBtn.onclick = doLogin;

    homeBtn.onclick = () => {
      window.location.href = '/';
    };

    emailInput.addEventListener('keydown', e => {
      if (e.key === 'Enter') doLogin();
    });

    passwordInput.addEventListener('keydown', e => {
      if (e.key === 'Enter') doLogin();
    });

    checkSession();
  </script>
</body>
</html>
