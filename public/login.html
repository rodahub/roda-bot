<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RØDA Login</title>
</head>
<body style="margin:0;min-height:100vh;display:flex;justify-content:center;align-items:center;background:#111;color:#fff;font-family:sans-serif;padding:20px">
  <div style="width:100%;max-width:400px;background:#1a1a1a;border:1px solid #333;border-radius:16px;padding:24px">
    <h1 style="margin-top:0;text-align:center">🔐 Staff Login</h1>

    <input id="username" type="text" placeholder="Username" style="width:100%;padding:12px;margin-bottom:12px;border-radius:10px;border:1px solid #444;background:#222;color:#fff;box-sizing:border-box" />
    <input id="password" type="password" placeholder="Password" style="width:100%;padding:12px;margin-bottom:12px;border-radius:10px;border:1px solid #444;background:#222;color:#fff;box-sizing:border-box" />

    <button id="loginBtn" style="width:100%;padding:12px;border:0;border-radius:10px;background:#2563eb;color:#fff;font-weight:bold;cursor:pointer">
      Accedi
    </button>

    <div id="msg" style="margin-top:12px;text-align:center;color:#fca5a5;min-height:20px"></div>
  </div>

  <script>
    const loginBtn = document.getElementById('loginBtn');
    const msg = document.getElementById('msg');

    loginBtn.onclick = async () => {
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;

      msg.textContent = '';
      loginBtn.disabled = true;
      loginBtn.innerText = 'Accesso...';

      try {
        const res = await fetch('/api/login', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          credentials: 'same-origin',
          body: JSON.stringify({ username, password })
        });

        const data = await res.json();

        if (!res.ok || !data.ok) {
          msg.textContent = data.message || 'Login fallito';
          loginBtn.disabled = false;
          loginBtn.innerText = 'Accedi';
          return;
        }

        window.location.href = '/';
      } catch (e) {
        msg.textContent = 'Errore di connessione';
        loginBtn.disabled = false;
        loginBtn.innerText = 'Accedi';
      }
    };
  </script>
</body>
</html>
