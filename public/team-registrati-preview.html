<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Team Registrati Preview</title>
  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      background: #0b0614;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
      padding: 20px;
    }

    .preview-wrapper {
      position: relative;
      width: 1672px;
      height: 941px;
      overflow: hidden;
      border-radius: 18px;
      box-shadow: 0 0 40px rgba(132, 73, 245, 0.30);
      background: #12091f;
    }

    .background {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 1;
      user-select: none;
      pointer-events: none;
    }

    .table-overlay {
      position: absolute;
      z-index: 2;
      top: 235px;
      left: 86px;
      width: 1500px;
      height: 620px;
      display: flex;
      flex-direction: column;
    }

    .table-header {
      display: grid;
      grid-template-columns: 130px 350px 1fr 1fr 1fr;
      column-gap: 12px;
      align-items: center;
      width: 100%;
      height: 42px;
      margin-bottom: 10px;
      padding: 0 10px;
      border-radius: 14px;
      background: linear-gradient(
        180deg,
        rgba(109, 56, 204, 0.96) 0%,
        rgba(82, 32, 176, 0.96) 55%,
        rgba(62, 19, 145, 0.98) 100%
      );
      border: 1px solid rgba(222, 193, 255, 0.92);
      box-shadow:
        0 0 16px rgba(160, 95, 255, 0.62),
        0 0 28px rgba(160, 95, 255, 0.28),
        inset 0 0 16px rgba(224, 195, 255, 0.18);
      backdrop-filter: blur(4px);
    }

    .header-cell {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: #ffffff;
      font-size: 18px;
      font-weight: 900;
      letter-spacing: 1.2px;
      text-transform: uppercase;
      text-align: center;
      text-shadow:
        0 0 8px rgba(255, 255, 255, 0.34),
        0 0 16px rgba(191, 134, 255, 0.68),
        0 0 26px rgba(130, 58, 255, 0.48);
    }

    .table-body {
      display: flex;
      flex-direction: column;
      gap: 6px;
      flex: 1;
    }

    .table-row {
      display: grid;
      grid-template-columns: 130px 350px 1fr 1fr 1fr;
      column-gap: 12px;
      align-items: center;
      width: 100%;
      height: 31px;
      padding: 0 10px;
      border-radius: 12px;
      background: rgba(74, 28, 146, 0.82);
      border: 1px solid rgba(188, 147, 255, 0.76);
      box-shadow:
        0 0 14px rgba(145, 74, 255, 0.30),
        0 0 22px rgba(145, 74, 255, 0.10),
        inset 0 0 12px rgba(214, 179, 255, 0.10);
      backdrop-filter: blur(3px);
    }

    .table-row:nth-child(odd) {
      background: rgba(84, 34, 160, 0.86);
    }

    .table-row.filled {
      box-shadow:
        0 0 16px rgba(149, 79, 255, 0.34),
        0 0 26px rgba(149, 79, 255, 0.12),
        inset 0 0 12px rgba(221, 190, 255, 0.12);
    }

    .cell {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      min-width: 0;
      text-align: center;
      color: #fffaff;
      font-size: 17px;
      font-weight: 800;
      line-height: 1;
      letter-spacing: 0.6px;
      text-transform: uppercase;
      text-shadow:
        0 0 6px rgba(255, 255, 255, 0.22),
        0 0 12px rgba(181, 129, 255, 0.42),
        0 0 18px rgba(118, 46, 255, 0.20);
    }

    .cell.slot {
      font-size: 18px;
      font-weight: 900;
    }

    .cell.team {
      font-size: 18px;
      font-weight: 900;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      padding: 0 8px;
    }

    .cell.player {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      padding: 0 8px;
    }

    .table-row.empty {
      background: rgba(63, 24, 124, 0.68);
      border: 1px solid rgba(162, 118, 235, 0.54);
      box-shadow:
        0 0 10px rgba(128, 64, 220, 0.16),
        inset 0 0 8px rgba(196, 158, 255, 0.06);
    }

    .table-row.empty .cell {
      color: rgba(245, 236, 255, 0.62);
      text-shadow:
        0 0 4px rgba(255, 255, 255, 0.08);
    }

    .empty-text {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: #f3ebff;
      font-size: 28px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 1px;
      text-shadow:
        0 0 8px rgba(255, 255, 255, 0.22),
        0 0 16px rgba(167, 117, 255, 0.55);
    }
  </style>
</head>
<body>
  <div class="preview-wrapper">
    <img
      class="background"
      src="/team-registrati-1672x941.png"
      alt="Team Registrati Background"
    />

    <div class="table-overlay">
      <div class="table-header">
        <div class="header-cell">Slot</div>
        <div class="header-cell">Team</div>
        <div class="header-cell">Player 1</div>
        <div class="header-cell">Player 2</div>
        <div class="header-cell">Player 3</div>
      </div>

      <div class="table-body" id="teamsTable">
        <div class="empty-text">Caricamento...</div>
      </div>
    </div>
  </div>

  <script>
    window.__RODA_RENDER_READY = false;

    function toSafeUpper(value) {
      return String(value || '-').trim().toUpperCase();
    }

    function buildEmptyRows(total, rows) {
      const result = [...rows];

      while (result.length < total) {
        result.push({
          slot: '-',
          team: '-',
          players: ['-', '-', '-'],
          empty: true
        });
      }

      return result.slice(0, total);
    }

    function createCell(className, text) {
      const cell = document.createElement('div');
      cell.className = `cell ${className}`;
      cell.textContent = text;
      return cell;
    }

    function renderRows(rows) {
      const table = document.getElementById('teamsTable');
      table.innerHTML = '';

      rows.forEach(rowData => {
        const row = document.createElement('div');
        row.className = `table-row ${rowData.empty ? 'empty' : 'filled'}`;

        row.appendChild(createCell('slot', rowData.slot === '-' ? '-' : `#${rowData.slot}`));
        row.appendChild(createCell('team', rowData.team));
        row.appendChild(createCell('player', rowData.players[0] || '-'));
        row.appendChild(createCell('player', rowData.players[1] || '-'));
        row.appendChild(createCell('player', rowData.players[2] || '-'));

        table.appendChild(row);
      });
    }

    async function loadRegisteredTeams() {
      const table = document.getElementById('teamsTable');

      try {
        const response = await fetch('/api/public/dashboard', { cache: 'no-store' });
        const data = await response.json();

        const teams = Array.isArray(data.teamRegistrati)
          ? data.teamRegistrati.slice(0, 16).map(item => ({
              slot: item.slot ?? '-',
              team: toSafeUpper(item.team || '-'),
              players: [
                toSafeUpper(item.players?.[0] || '-'),
                toSafeUpper(item.players?.[1] || '-'),
                toSafeUpper(item.players?.[2] || '-')
              ],
              empty: false
            }))
          : [];

        renderRows(buildEmptyRows(16, teams));
      } catch (error) {
        table.innerHTML = '<div class="empty-text">Errore caricamento dati</div>';
        console.error(error);
      } finally {
        window.__RODA_RENDER_READY = true;
      }
    }

    loadRegisteredTeams();
  </script>
</body>
</html>
