<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RØDA Dashboard</title>
</head>

<body style="font-family:sans-serif;background:#111;color:#fff;margin:0;padding:20px">

<div style="display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap">
  <div>
    <h1 style="margin:0 0 6px 0">🏆 CLASSIFICA LIVE</h1>
    <div id="staffInfo" style="color:#aaa;font-size:14px">Dashboard pronta</div>
  </div>

  <div style="display:flex;gap:10px;flex-wrap:wrap">
    <button id="refreshBtn" style="padding:10px 14px;border:0;border-radius:10px;background:#2563eb;color:#fff;font-weight:bold;cursor:pointer">
      Aggiorna
    </button>
    <button id="logoutBtn" style="padding:10px 14px;border:0;border-radius:10px;background:#dc2626;color:#fff;font-weight:bold;cursor:pointer">
      Logout
    </button>
  </div>
</div>

<div id="leaderboard" style="margin-top:14px"></div>

<h1>📸 RISULTATI IN ATTESA</h1>
<div id="pending"></div>

<script>
let loading = false;

function escapeHtml(text) {
  return String(text ?? '')
    .replaceAll('&', '&amp;')
    .replaceAll('<', '&lt;')
    .replaceAll('>', '&gt;')
    .replaceAll('"', '&quot;')
    .replaceAll("'", '&#039;');
}

async function load() {
  if (loading) return;
  loading = true;

  const refreshBtn = document.getElementById('refreshBtn');
  refreshBtn.disabled = true;
  refreshBtn.innerText = 'Aggiornamento...';

  try {
    const lbRes = await fetch('/api/leaderboard', {
      credentials: 'same-origin'
    });

    if (lbRes.status === 401) {
      window.location.href = '/login';
      return;
    }

    const pRes = await fetch('/api/pending', {
      credentials: 'same-origin'
    });

    if (pRes.status === 401) {
      window.location.href = '/login';
      return;
    }

    const lb = await lbRes.json();
    const p = await pRes.json();

    document.getElementById('leaderboard').innerHTML =
      (lb.scores || []).length
        ? lb.scores.map((t, i) => `
            <div style="border:1px solid #555;margin:10px 0;padding:10px;border-radius:12px">
              <b>#${i + 1} ${escapeHtml(t[0])}</b> - ${Number(t[1] || 0)} pts
            </div>
          `).join("")
        : `<div style="color:#aaa">Nessun punteggio disponibile</div>`;

    document.getElementById('pending').innerHTML =
      Object.entries(p || {}).length
        ? Object.entries(p).map(([id, r]) => `
            <div style="border:1px solid #555;margin:10px 0;padding:10px;border-radius:12px">
              <b>${escapeHtml(r.team || '-')}</b><br>
              Kill: ${Number(r.total || 0)} | Pos: ${Number(r.pos || 0)}<br>
              ${r.image ? `<img src="${escapeHtml(r.image)}" width="200" style="margin-top:10px;border-radius:10px">` : ''}
              <br><br>
              <button onclick="approveResult('${encodeURIComponent(id)}')" style="padding:8px 12px;border:0;border-radius:8px;background:#16a34a;color:#fff;cursor:pointer">
                ✅
              </button>
              <button onclick="rejectResult('${encodeURIComponent(id)}')" style="padding:8px 12px;border:0;border-radius:8px;background:#dc2626;color:#fff;cursor:pointer">
                ❌
              </button>
            </div>
          `).join("")
        : `<div style="color:#aaa">Nessun risultato pending</div>`;
  } catch (e) {
    console.error('Errore dashboard:', e);
  } finally {
    loading = false;
    refreshBtn.disabled = false;
    refreshBtn.innerText = 'Aggiorna';
  }
}

async function approveResult(id) {
  const res = await fetch('/api/approve/' + id, {
    method: 'POST',
    credentials: 'same-origin'
  });

  if (res.status === 401) {
    window.location.href = '/login';
    return;
  }

  await load();
}

async function rejectResult(id) {
  const res = await fetch('/api/reject/' + id, {
    method: 'POST',
    credentials: 'same-origin'
  });

  if (res.status === 401) {
    window.location.href = '/login';
    return;
  }

  await load();
}

async function logout() {
  await fetch('/api/logout', {
    method: 'POST',
    credentials: 'same-origin'
  });

  window.location.href = '/login';
}

document.getElementById('refreshBtn').addEventListener('click', load);
document.getElementById('logoutBtn').addEventListener('click', logout);

window.approveResult = approveResult;
window.rejectResult = rejectResult;

load();
</script>

</body>
</html>
