<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Top Fragger Preview</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;800&display=swap"
    rel="stylesheet"
  />

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
      background: #12081f;
      font-family: 'Orbitron', sans-serif;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 20px;
    }

    .preview-wrapper {
      position: relative;
      width: 1672px;
      height: 941px;
      overflow: hidden;
      background: #140b22;
    }

    .background {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 1;
      user-select: none;
      pointer-events: none;
    }

    .table-overlay {
      position: absolute;
      z-index: 2;

      /* POSIZIONE TABELLA */
      top: 255px;
      left: 95px;

      /* DIMENSIONI TABELLA */
      width: 1485px;
      height: 560px;

      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .table-header,
    .table-row {
      display: grid;
      grid-template-columns: 300px 1fr 320px;
      align-items: center;
      width: 100%;
    }

    .table-header {
      height: 58px;
      gap: 8px;
      margin-bottom: 2px;
    }

    .table-row {
      height: 42px;
      gap: 8px;
    }

    .head-cell {
      height: 58px;
      display: flex;
      align-items: center;
      justify-content: center;

      border-radius: 18px;
      background: linear-gradient(180deg, rgba(142, 74, 255, 0.95) 0%, rgba(92, 27, 211, 0.96) 100%);
      border: 2px solid rgba(198, 164, 255, 0.65);

      color: #ffffff;
      font-size: 26px;
      font-weight: 800;
      letter-spacing: 1px;
      text-transform: uppercase;
      text-align: center;

      box-shadow:
        0 0 12px rgba(154, 92, 255, 0.55),
        0 0 24px rgba(154, 92, 255, 0.22),
        inset 0 0 14px rgba(255, 255, 255, 0.08);
    }

    .cell {
      height: 42px;
      display: flex;
      align-items: center;
      justify-content: center;

      border-radius: 15px;
      border: 2px solid rgba(183, 140, 255, 0.82);
      background: rgba(255, 255, 255, 0.02);

      color: #3a176d;
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 0.6px;
      text-transform: uppercase;
      text-align: center;

      box-shadow:
        0 0 8px rgba(183, 140, 255, 0.35),
        inset 0 0 6px rgba(183, 140, 255, 0.10);
    }

    .position-cell {
      font-size: 18px;
      font-weight: 800;
    }

    .name-cell {
      padding: 0 12px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .kill-cell {
      font-size: 18px;
      font-weight: 800;
    }

    .top-1 .cell,
    .top-2 .cell,
    .top-3 .cell {
      color: #2e0f63;
      border: 2px solid rgba(157, 92, 255, 0.95);
      background: rgba(145, 75, 255, 0.05);
      box-shadow:
        0 0 10px rgba(157, 92, 255, 0.50),
        0 0 18px rgba(157, 92, 255, 0.18),
        inset 0 0 8px rgba(157, 92, 255, 0.12);
    }
  </style>
</head>
<body>
  <div class="preview-wrapper">
    <img
      class="background"
      src="/top%20fragger%201672x941.png"
      alt="Top Fragger Background"
    />

    <div class="table-overlay" id="topFraggerTable">
      <div class="table-header">
        <div class="head-cell">POSIZIONE</div>
        <div class="head-cell">GIOCATORE</div>
        <div class="head-cell">KILL</div>
      </div>
    </div>
  </div>

  <script>
    async function loadTopFraggers() {
      const table = document.getElementById('topFraggerTable');

      try {
        const response = await fetch('/api/public/dashboard');
        const data = await response.json();

        const fraggers = Array.isArray(data.classificaFragger)
          ? data.classificaFragger.slice(0, 10)
          : [];

        for (let i = 0; i < 10; i++) {
          const player = fraggers[i] || {};

          const row = document.createElement('div');
          row.className = 'table-row';

          if (i === 0) row.classList.add('top-1');
          if (i === 1) row.classList.add('top-2');
          if (i === 2) row.classList.add('top-3');

          const posizione = document.createElement('div');
          posizione.className = 'cell position-cell';
          posizione.textContent = `${i + 1}°`;

          const nome = document.createElement('div');
          nome.className = 'cell name-cell';
          nome.textContent = player.nome ? String(player.nome).toUpperCase() : '';

          const kills = document.createElement('div');
          kills.className = 'cell kill-cell';
          kills.textContent = player.uccisioni != null ? String(player.uccisioni) : '';

          row.appendChild(posizione);
          row.appendChild(nome);
          row.appendChild(kills);

          table.appendChild(row);
        }
      } catch (error) {
        console.error('Errore caricamento top fragger:', error);

        for (let i = 0; i < 10; i++) {
          const row = document.createElement('div');
          row.className = 'table-row';

          const posizione = document.createElement('div');
          posizione.className = 'cell position-cell';
          posizione.textContent = `${i + 1}°`;

          const nome = document.createElement('div');
          nome.className = 'cell name-cell';
          nome.textContent = '';

          const kills = document.createElement('div');
          kills.className = 'cell kill-cell';
          kills.textContent = '';

          row.appendChild(posizione);
          row.appendChild(nome);
          row.appendChild(kills);

          table.appendChild(row);
        }
      }
    }

    loadTopFraggers();
  </script>
</body>
</html>
