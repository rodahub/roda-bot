<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Top Fragger Preview</title>
  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      background: #0b0614;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
      padding: 20px;
    }

    .preview-wrapper {
      position: relative;
      width: 1672px;
      height: 941px;
      overflow: hidden;
      border-radius: 18px;
      box-shadow: 0 0 40px rgba(122, 58, 255, 0.34);
      background: #12091f;
    }

    .background {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 1;
      user-select: none;
      pointer-events: none;
    }

    .table-overlay {
      position: absolute;
      z-index: 2;

      /* POSIZIONE TABELLA */
      top: 260px;
      left: 146px;

      width: 1380px;
      height: 300px;

      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .table-row {
      display: grid;
      grid-template-columns: 135px 1fr 180px;
      align-items: center;

      width: 100%;
      height: 48px;

      padding: 0 18px;
      border-radius: 14px;

      background: rgba(72, 33, 138, 0.22);
      border: 1px solid rgba(182, 132, 255, 0.70);

      box-shadow:
        0 0 18px rgba(156, 94, 255, 0.26),
        0 0 28px rgba(156, 94, 255, 0.10),
        inset 0 0 14px rgba(200, 162, 255, 0.10);
    }

    .cell {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;

      color: #fffaff;
      font-weight: 800;
      font-size: 28px;
      line-height: 1;
      letter-spacing: 0.8px;
      text-transform: uppercase;

      text-shadow:
        0 0 8px rgba(255, 255, 255, 0.34),
        0 0 16px rgba(190, 125, 255, 0.70),
        0 0 28px rgba(118, 46, 255, 0.52);
    }

    .cell.position {
      font-size: 27px;
    }

    .cell.name {
      justify-content: center;
      text-align: center;
      padding: 0 18px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .cell.kills {
      font-size: 29px;
    }

    .table-row.top-1 {
      background: rgba(118, 64, 224, 0.30);
      border: 1px solid rgba(236, 208, 255, 0.90);
      box-shadow:
        0 0 22px rgba(198, 138, 255, 0.46),
        0 0 34px rgba(198, 138, 255, 0.22),
        inset 0 0 18px rgba(224, 192, 255, 0.18);
    }

    .table-row.top-2 {
      background: rgba(102, 54, 204, 0.28);
      border: 1px solid rgba(220, 184, 255, 0.82);
      box-shadow:
        0 0 20px rgba(184, 126, 255, 0.40),
        0 0 30px rgba(184, 126, 255, 0.18),
        inset 0 0 16px rgba(214, 176, 255, 0.16);
    }

    .table-row.top-3 {
      background: rgba(90, 46, 182, 0.26);
      border: 1px solid rgba(206, 166, 255, 0.76);
      box-shadow:
        0 0 18px rgba(174, 115, 255, 0.34),
        0 0 28px rgba(174, 115, 255, 0.15),
        inset 0 0 15px rgba(198, 156, 255, 0.14);
    }

    .table-row.top-4,
    .table-row.top-5 {
      background: rgba(76, 36, 150, 0.24);
      border: 1px solid rgba(192, 150, 255, 0.72);
      box-shadow:
        0 0 17px rgba(166, 108, 255, 0.28),
        0 0 26px rgba(166, 108, 255, 0.12),
        inset 0 0 13px rgba(190, 145, 255, 0.12);
    }

    .table-row.top-1 .cell,
    .table-row.top-2 .cell,
    .table-row.top-3 .cell,
    .table-row.top-4 .cell,
    .table-row.top-5 .cell {
      color: #ffffff;
      text-shadow:
        0 0 10px rgba(255, 255, 255, 0.42),
        0 0 18px rgba(205, 150, 255, 0.82),
        0 0 30px rgba(130, 58, 255, 0.62);
    }

    .empty-text {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: #f3ebff;
      font-size: 32px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 1px;
      text-shadow:
        0 0 8px rgba(255, 255, 255, 0.22),
        0 0 16px rgba(167, 117, 255, 0.55);
    }
  </style>
</head>
<body>
  <div class="preview-wrapper">
    <img
      class="background"
      src="/top%20fragger%201672x941.png"
      alt="Top Fragger Background"
    />

    <div class="table-overlay" id="fraggerTable">
      <div class="empty-text">Caricamento...</div>
    </div>
  </div>

  <script>
    async function loadTopFraggers() {
      const table = document.getElementById('fraggerTable');

      try {
        const response = await fetch('/api/public/dashboard');
        const data = await response.json();

        const fraggers = Array.isArray(data.classificaFragger)
          ? data.classificaFragger.slice(0, 5)
          : [];

        if (!fraggers.length) {
          table.innerHTML = '<div class="empty-text">Nessun dato disponibile</div>';
          return;
        }

        table.innerHTML = '';

        fraggers.forEach((player, index) => {
          const row = document.createElement('div');
          row.className = 'table-row';

          if (index === 0) row.classList.add('top-1');
          if (index === 1) row.classList.add('top-2');
          if (index === 2) row.classList.add('top-3');
          if (index === 3) row.classList.add('top-4');
          if (index === 4) row.classList.add('top-5');

          const posizione = document.createElement('div');
          posizione.className = 'cell position';
          posizione.textContent = `${index + 1}°`;

          const nome = document.createElement('div');
          nome.className = 'cell name';
          nome.textContent = String(player.nome || '-').toUpperCase();

          const kills = document.createElement('div');
          kills.className = 'cell kills';
          kills.textContent = String(player.uccisioni ?? 0);

          row.appendChild(posizione);
          row.appendChild(nome);
          row.appendChild(kills);

          table.appendChild(row);
        });
      } catch (error) {
        table.innerHTML = '<div class="empty-text">Errore caricamento dati</div>';
        console.error(error);
      }
    }

    loadTopFraggers();
  </script>
</body>
</html>
