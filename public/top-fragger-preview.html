<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Top Fragger Preview</title>
  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      background: #0b0614;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
      padding: 20px;
    }

    .preview-wrapper {
      position: relative;
      width: 1672px;
      height: 941px;
      overflow: hidden;
      border-radius: 18px;
      box-shadow: 0 0 40px rgba(91, 36, 182, 0.34);
      background: #12091f;
    }

    .background {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 1;
      user-select: none;
      pointer-events: none;
    }

    .table-overlay {
      position: absolute;
      z-index: 2;

      /* TABELLA CENTRATA */
      top: 285px;
      left: 50%;
      transform: translateX(-50%);

      width: 1380px;
      min-height: 430px;

      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      gap: 20px;
    }

    .table-row {
      display: grid;
      grid-template-columns: 170px 1fr 170px;
      align-items: center;

      width: 100%;
      height: 68px;

      padding: 0 26px;
      border-radius: 18px;

      background: rgba(103, 65, 170, 0.52);
      border: 2px solid rgba(150, 93, 255, 0.78);

      box-shadow:
        0 0 16px rgba(132, 73, 245, 0.28),
        0 0 28px rgba(132, 73, 245, 0.14),
        inset 0 0 18px rgba(214, 186, 255, 0.08);
    }

    .cell {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;

      color: #ffffff;
      font-weight: 900;
      font-size: 33px;
      line-height: 1;
      letter-spacing: 0.6px;
      text-transform: uppercase;

      text-shadow:
        0 0 5px rgba(255, 255, 255, 0.15),
        0 0 10px rgba(154, 97, 255, 0.20);
    }

    .cell.position {
      font-size: 32px;
    }

    .cell.name {
      text-align: center;
      padding: 0 18px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .cell.kills {
      font-size: 32px;
    }

    .table-row.top-1,
    .table-row.top-2,
    .table-row.top-3,
    .table-row.top-4,
    .table-row.top-5 {
      background: rgba(110, 74, 182, 0.54);
      border: 2px solid rgba(165, 108, 255, 0.82);
      box-shadow:
        0 0 18px rgba(139, 79, 255, 0.32),
        0 0 30px rgba(139, 79, 255, 0.16),
        inset 0 0 18px rgba(228, 206, 255, 0.08);
    }

    .table-row.top-1 .cell,
    .table-row.top-2 .cell,
    .table-row.top-3 .cell,
    .table-row.top-4 .cell,
    .table-row.top-5 .cell {
      color: #ffffff;
      text-shadow:
        0 0 6px rgba(255, 255, 255, 0.16),
        0 0 10px rgba(170, 120, 255, 0.18);
    }

    .empty-text {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: #f3ebff;
      font-size: 32px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 1px;
      text-shadow:
        0 0 8px rgba(255, 255, 255, 0.22),
        0 0 16px rgba(167, 117, 255, 0.55);
    }
  </style>
</head>
<body>
  <div class="preview-wrapper">
    <img
      class="background"
      src="/top%20fragger%201672x941.png"
      alt="Top Fragger Background"
    />

    <div class="table-overlay" id="fraggerTable">
      <div class="empty-text">Caricamento...</div>
    </div>
  </div>

  <script>
    async function loadTopFraggers() {
      const table = document.getElementById('fraggerTable');

      try {
        const response = await fetch('/api/public/dashboard');
        const data = await response.json();

        const fraggers = Array.isArray(data.classificaFragger)
          ? data.classificaFragger.slice(0, 5)
          : [];

        if (!fraggers.length) {
          table.innerHTML = '<div class="empty-text">Nessun dato disponibile</div>';
          return;
        }

        table.innerHTML = '';

        fraggers.forEach((player, index) => {
          const row = document.createElement('div');
          row.className = 'table-row';

          if (index === 0) row.classList.add('top-1');
          if (index === 1) row.classList.add('top-2');
          if (index === 2) row.classList.add('top-3');
          if (index === 3) row.classList.add('top-4');
          if (index === 4) row.classList.add('top-5');

          const posizione = document.createElement('div');
          posizione.className = 'cell position';
          posizione.textContent = `${index + 1}°`;

          const nome = document.createElement('div');
          nome.className = 'cell name';
          nome.textContent = String(player.nome || '-').toUpperCase();

          const kills = document.createElement('div');
          kills.className = 'cell kills';
          kills.textContent = String(player.uccisioni ?? 0);

          row.appendChild(posizione);
          row.appendChild(nome);
          row.appendChild(kills);

          table.appendChild(row);
        });
      } catch (error) {
        table.innerHTML = '<div class="empty-text">Errore caricamento dati</div>';
        console.error(error);
      }
    }

    loadTopFraggers();
  </script>
</body>
</html>
