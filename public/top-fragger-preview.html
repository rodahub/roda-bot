<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Top Fragger Preview</title>
  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      background: #0b0614;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
      padding: 20px;
    }

    .preview-wrapper {
      position: relative;
      width: 1672px;
      height: 941px;
      overflow: hidden;
      border-radius: 18px;
      box-shadow: 0 0 35px rgba(122, 58, 255, 0.28);
      background: #12091f;
    }

    .background {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 1;
      user-select: none;
      pointer-events: none;
    }

    .table-overlay {
      position: absolute;
      z-index: 2;

      /* POSIZIONE TABELLA */
      top: 260px;
      left: 146px;

      width: 1380px;
      height: 520px;

      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .table-row {
      display: grid;
      grid-template-columns: 135px 1fr 180px;
      align-items: center;

      width: 100%;
      height: 44px;

      padding: 0 18px;
      border-radius: 14px;

      background: rgba(57, 25, 107, 0.16);
      border: 1px solid rgba(167, 117, 255, 0.42);

      box-shadow:
        0 0 14px rgba(144, 84, 255, 0.18),
        inset 0 0 12px rgba(183, 140, 255, 0.08);
    }

    .cell {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;

      color: #f4ecff;
      font-weight: 800;
      font-size: 28px;
      line-height: 1;
      letter-spacing: 0.8px;
      text-transform: uppercase;

      text-shadow:
        0 0 6px rgba(255, 255, 255, 0.28),
        0 0 12px rgba(174, 105, 255, 0.55),
        0 0 20px rgba(118, 46, 255, 0.42);
    }

    .cell.position {
      font-size: 27px;
    }

    .cell.name {
      justify-content: center;
      text-align: center;
      padding: 0 18px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .cell.kills {
      font-size: 29px;
    }

    .table-row.top-1 {
      background: rgba(103, 51, 194, 0.24);
      border: 1px solid rgba(223, 188, 255, 0.72);
      box-shadow:
        0 0 18px rgba(186, 125, 255, 0.35),
        inset 0 0 16px rgba(214, 176, 255, 0.14);
    }

    .table-row.top-2 {
      background: rgba(90, 43, 176, 0.22);
      border: 1px solid rgba(206, 165, 255, 0.65);
      box-shadow:
        0 0 16px rgba(176, 112, 255, 0.30),
        inset 0 0 14px rgba(206, 165, 255, 0.12);
    }

    .table-row.top-3 {
      background: rgba(78, 36, 158, 0.20);
      border: 1px solid rgba(189, 146, 255, 0.58);
      box-shadow:
        0 0 15px rgba(165, 101, 255, 0.26),
        inset 0 0 12px rgba(189, 146, 255, 0.10);
    }

    .table-row.top-1 .cell,
    .table-row.top-2 .cell,
    .table-row.top-3 .cell {
      color: #ffffff;
      text-shadow:
        0 0 8px rgba(255, 255, 255, 0.38),
        0 0 14px rgba(191, 134, 255, 0.72),
        0 0 24px rgba(130, 58, 255, 0.55);
    }

    .empty-text {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: #f3ebff;
      font-size: 32px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 1px;
      text-shadow:
        0 0 8px rgba(255, 255, 255, 0.22),
        0 0 16px rgba(167, 117, 255, 0.55);
    }
  </style>
</head>
<body>
  <div class="preview-wrapper">
    <img
      class="background"
      src="/top%20fragger%201672x941.png"
      alt="Top Fragger Background"
    />

    <div class="table-overlay" id="fraggerTable">
      <div class="empty-text">Caricamento...</div>
    </div>
  </div>

  <script>
    async function loadTopFraggers() {
      const table = document.getElementById('fraggerTable');

      try {
        const response = await fetch('/api/public/dashboard');
        const data = await response.json();

        const fraggers = Array.isArray(data.classificaFragger)
          ? data.classificaFragger.slice(0, 10)
          : [];

        if (!fraggers.length) {
          table.innerHTML = '<div class="empty-text">Nessun dato disponibile</div>';
          return;
        }

        table.innerHTML = '';

        fraggers.forEach((player, index) => {
          const row = document.createElement('div');
          row.className = 'table-row';

          if (index === 0) row.classList.add('top-1');
          if (index === 1) row.classList.add('top-2');
          if (index === 2) row.classList.add('top-3');

          const posizione = document.createElement('div');
          posizione.className = 'cell position';
          posizione.textContent = `#${player.posizione || index + 1}`;

          const nome = document.createElement('div');
          nome.className = 'cell name';
          nome.textContent = String(player.nome || '-').toUpperCase();

          const kills = document.createElement('div');
          kills.className = 'cell kills';
          kills.textContent = String(player.uccisioni ?? 0);

          row.appendChild(posizione);
          row.appendChild(nome);
          row.appendChild(kills);

          table.appendChild(row);
        });
      } catch (error) {
        table.innerHTML = '<div class="empty-text">Errore caricamento dati</div>';
        console.error(error);
      }
    }

    loadTopFraggers();
  </script>
</body>
</html>
