<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Top Fragger Preview</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;800;900&display=swap"
    rel="stylesheet"
  />

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
      background: #10071a;
      font-family: 'Orbitron', sans-serif;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 20px;
    }

    .preview-wrapper {
      position: relative;
      width: 1672px;
      height: 941px;
      overflow: hidden;
      background: #140a21;
    }

    .background {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 1;
      pointer-events: none;
      user-select: none;
    }

    .table-overlay {
      position: absolute;
      z-index: 2;

      /* POSIZIONE TABELLA */
      top: 255px;
      left: 100px;

      /* DIMENSIONI TABELLA */
      width: 1470px;

      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .table-header,
    .table-row {
      width: 100%;
      display: grid;
      grid-template-columns: 300px 1fr 300px;
      gap: 8px;
      align-items: center;
    }

    .table-header {
      height: 62px;
      margin-bottom: 2px;
    }

    .table-row {
      height: 54px;
    }

    .head-cell {
      height: 62px;
      display: flex;
      align-items: center;
      justify-content: center;

      border-radius: 18px;
      border: 2px solid rgba(222, 198, 255, 0.78);

      background:
        linear-gradient(180deg, rgba(158, 84, 255, 0.98) 0%, rgba(91, 26, 211, 0.98) 100%);

      color: #ffffff;
      text-align: center;
      text-transform: uppercase;
      letter-spacing: 1.4px;
      font-size: 22px;
      font-weight: 900;

      box-shadow:
        0 0 10px rgba(173, 106, 255, 0.95),
        0 0 20px rgba(173, 106, 255, 0.90),
        0 0 34px rgba(173, 106, 255, 0.70),
        0 0 55px rgba(173, 106, 255, 0.45),
        inset 0 0 18px rgba(255, 255, 255, 0.15);

      text-shadow:
        0 0 6px rgba(255, 255, 255, 0.35),
        0 0 14px rgba(255, 255, 255, 0.22);
    }

    .cell {
      height: 54px;
      display: flex;
      align-items: center;
      justify-content: center;

      border-radius: 16px;
      border: 2px solid rgba(179, 133, 255, 0.95);
      background: rgba(255, 255, 255, 0.035);

      color: #32115f;
      text-align: center;
      text-transform: uppercase;
      letter-spacing: 0.7px;
      font-size: 18px;
      font-weight: 800;

      box-shadow:
        0 0 8px rgba(177, 126, 255, 0.72),
        0 0 16px rgba(177, 126, 255, 0.42),
        inset 0 0 7px rgba(177, 126, 255, 0.18);
    }

    .position-cell,
    .kill-cell {
      font-size: 18px;
      font-weight: 900;
    }

    .name-cell {
      padding: 0 18px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* TOP 1 / 2 / 3 più illuminati */
    .top-1 .cell,
    .top-2 .cell,
    .top-3 .cell {
      border: 2px solid rgba(188, 146, 255, 1);
      background: rgba(151, 82, 255, 0.07);
      color: #2d0f58;

      box-shadow:
        0 0 12px rgba(175, 115, 255, 0.95),
        0 0 22px rgba(175, 115, 255, 0.70),
        0 0 34px rgba(175, 115, 255, 0.35),
        inset 0 0 10px rgba(175, 115, 255, 0.20);
    }

    /* anche 4 e 5 belli visibili, non sbiaditi */
    .top-4 .cell,
    .top-5 .cell {
      border: 2px solid rgba(183, 140, 255, 0.98);
      background: rgba(255, 255, 255, 0.04);
      color: #331261;

      box-shadow:
        0 0 10px rgba(172, 118, 255, 0.82),
        0 0 18px rgba(172, 118, 255, 0.42),
        inset 0 0 8px rgba(172, 118, 255, 0.14);
    }
  </style>
</head>
<body>
  <div class="preview-wrapper">
    <img
      class="background"
      src="/top%20fragger%201672x941.png"
      alt="Top Fragger Background"
    />

    <div class="table-overlay" id="topFraggerTable">
      <div class="table-header">
        <div class="head-cell">POSIZIONE</div>
        <div class="head-cell">GIOCATORE</div>
        <div class="head-cell">KILL</div>
      </div>
    </div>
  </div>

  <script>
    async function loadTopFraggers() {
      const table = document.getElementById('topFraggerTable');

      try {
        const response = await fetch('/api/public/dashboard');
        const data = await response.json();

        const fraggers = Array.isArray(data.classificaFragger)
          ? data.classificaFragger.slice(0, 5)
          : [];

        for (let i = 0; i < 5; i++) {
          const player = fraggers[i] || {};

          const row = document.createElement('div');
          row.className = `table-row top-${i + 1}`;

          const posizione = document.createElement('div');
          posizione.className = 'cell position-cell';
          posizione.textContent = `${i + 1}°`;

          const nome = document.createElement('div');
          nome.className = 'cell name-cell';
          nome.textContent = player.nome ? String(player.nome).toUpperCase() : '';

          const kills = document.createElement('div');
          kills.className = 'cell kill-cell';
          kills.textContent = player.uccisioni != null ? String(player.uccisioni) : '';

          row.appendChild(posizione);
          row.appendChild(nome);
          row.appendChild(kills);

          table.appendChild(row);
        }
      } catch (error) {
        console.error('Errore caricamento top fragger:', error);

        for (let i = 0; i < 5; i++) {
          const row = document.createElement('div');
          row.className = `table-row top-${i + 1}`;

          const posizione = document.createElement('div');
          posizione.className = 'cell position-cell';
          posizione.textContent = `${i + 1}°`;

          const nome = document.createElement('div');
          nome.className = 'cell name-cell';
          nome.textContent = '';

          const kills = document.createElement('div');
          kills.className = 'cell kill-cell';
          kills.textContent = '';

          row.appendChild(posizione);
          row.appendChild(nome);
          row.appendChild(kills);

          table.appendChild(row);
        }
      }
    }

    loadTopFraggers();
  </script>
</body>
</html>
